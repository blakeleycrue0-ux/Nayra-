<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>¿Puedo salir?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-top:#8ecbf2;
    --sky-bottom:#c9e8fb;
    --sun:#ffd23f;
    --ink:#1e3a4c;
    --card:#ffffff;
    --green:#3ecf6a;
    --orange:#ff9f3d;
    --red:#ff5b5b;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%;
    font-family:'Nunito', sans-serif;
    color:var(--ink);
  }
  body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 65%, #e9f6ff 100%);
    overflow-x:hidden;
    padding:20px;
    transition:background 0.8s ease;
  }
  /* floating sun */
  .sun{
    position:fixed;
    top:-60px; right:-60px;
    width:220px; height:220px;
    background:radial-gradient(circle, var(--sun) 0%, #ffe9a3 70%, transparent 72%);
    border-radius:50%;
    filter:blur(1px);
    z-index:0;
    animation:pulse 6s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.08);}
  }
  .cloud{
    position:fixed;
    background:#ffffff;
    border-radius:50px;
    opacity:0.8;
    z-index:0;
  }
  .cloud.c1{width:90px;height:34px; top:12%; left:8%; animation:drift 40s linear infinite;}
  .cloud.c2{width:60px;height:24px; top:22%; left:-20%; animation:drift 55s linear infinite; animation-delay:5s;}
  @keyframes drift{
    from{transform:translateX(0);}
    to{transform:translateX(140vw);}
  }

  .card{
    position:relative;
    z-index:1;
    background:var(--card);
    border-radius:36px;
    padding:36px 28px 40px;
    max-width:420px;
    width:100%;
    text-align:center;
    box-shadow:0 20px 50px rgba(30,58,76,0.18);
  }

  .clock{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size:clamp(48px,13vw,64px);
    letter-spacing:1px;
    margin:0 0 4px;
    line-height:1;
  }
  .clock .ampm{
    font-size:0.35em;
    vertical-align:middle;
    color:#8098a6;
    font-weight:700;
  }
  .date{
    font-weight:800;
    color:#8098a6;
    font-size:15px;
    margin-bottom:22px;
    text-transform:capitalize;
  }

  .light-wrap{
    display:flex;
    justify-content:center;
    margin:6px 0 18px;
  }
  .light{
    width:170px; height:170px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:78px;
    box-shadow:
      0 0 0 10px rgba(255,255,255,0.6),
      0 18px 30px rgba(0,0,0,0.15);
    transition:background 0.6s ease;
    animation:breathe 2.6s ease-in-out infinite;
  }
  @keyframes breathe{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.035);}
  }
  .light.green{background:radial-gradient(circle at 35% 30%, #7be89a, var(--green));}
  .light.orange{background:radial-gradient(circle at 35% 30%, #ffc27a, var(--orange));}
  .light.red{background:radial-gradient(circle at 35% 30%, #ff9494, var(--red));}

  .message{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:clamp(24px,7vw,30px);
    margin:0 0 8px;
  }
  .message.green{color:#1f9e4f;}
  .message.orange{color:#d97a1f;}
  .message.red{color:#e04343;}

  .submessage{
    font-weight:600;
    color:#5c7484;
    font-size:16px;
    margin-bottom:22px;
    line-height:1.4;
  }

  .temp-row{
    display:inline-flex;
    align-items:center;
    gap:10px;
    background:#f2f8fc;
    padding:12px 22px;
    border-radius:20px;
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:22px;
    color:var(--ink);
  }
  .temp-row .icon{font-size:26px;}

  .place{
    margin-top:18px;
    font-weight:800;
    font-size:13px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:#a9bcc7;
  }

  .loading{
    font-weight:700;
    color:#8098a6;
    padding:40px 0;
  }
</style>
</head>
<body>

<div class="sun"></div>
<div class="cloud c1"></div>
<div class="cloud c2"></div>

<div class="card">
  <div id="content" class="loading">Cargando… ☀️</div>
</div>

<script>
const LAT = 39.5696;
const LON = 2.6502;
const TIMEZONE = "Europe/Madrid";
const HOT_TEMP = 27;
const DANGER_TEMP = 32;

function getMadridParts(){
  const fmt = new Intl.DateTimeFormat('es-ES', {
    timeZone: TIMEZONE,
    hour: '2-digit', minute:'2-digit', hour12:false,
    weekday:'long', day:'numeric', month:'long'
  });
  const parts = fmt.formatToParts(new Date());
  const map = {};
  parts.forEach(p => map[p.type] = p.value);
  return {
    hour: parseInt(map.hour,10),
    minute: parseInt(map.minute,10),
    weekday: map.weekday,
    day: map.day,
    month: map.month
  };
}

function formatClock(hour, minute){
  let h12 = hour % 12;
  if(h12 === 0) h12 = 12;
  const mm = minute.toString().padStart(2,'0');
  const ampm = hour < 12 ? 'AM' : 'PM';
  return { time: h12 + ':' + mm, ampm };
}

function decide(hour, temp){
  // nighttime
  if(hour < 8 || hour >= 21){
    return { level:'red', reason:'night' };
  }
  const isSiesta = hour >= 13 && hour < 16;

  if(isSiesta){
    if(temp > DANGER_TEMP) return { level:'red', reason:'heat' };
    return { level:'orange', reason:'siesta' };
  }

  if(temp > DANGER_TEMP) return { level:'red', reason:'heat' };
  if(temp > HOT_TEMP) return { level:'orange', reason:'warm' };
  return { level:'green', reason:'good' };
}

const MESSAGES = {
  red: {
    night: { title:'¡Es de noche!', sub:'Ahora toca quedarse en casa. ¡Mañana podrás salir otra vez!', emoji:'🌙' },
    heat: { title:'¡Hace demasiado calor!', sub:'Mejor quédate dentro, fresquito, hasta que baje el sol.', emoji:'🥵' }
  },
  orange: {
    siesta: { title:'Ten cuidado', sub:'El sol pega fuerte. Ponte gorra, crema solar y bebe agua.', emoji:'🧢' },
    warm: { title:'Hace calorcito', sub:'Puedes salir con cuidado: gorra, agua y un poco de sombra.', emoji:'💧' }
  },
  green: {
    good: { title:'¡Puedes salir a jugar!', sub:'Hace un tiempo perfecto para estar fuera. ¡Diviértete!', emoji:'⚽' }
  }
};

const EMOJI_BY_LEVEL = { red:'✋', orange:'⚠️', green:'✅' };

async function loadWeather(){
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m&timezone=${encodeURIComponent(TIMEZONE)}`;
  const res = await fetch(url);
  const data = await res.json();
  return Math.round(data.current.temperature_2m);
}

function render(temp){
  const { hour, minute, weekday, day, month } = getMadridParts();
  const { time, ampm } = formatClock(hour, minute);
  const decision = decide(hour, temp);
  const msg = MESSAGES[decision.level][decision.reason];

  document.body.style.background = decision.level === 'red'
    ? 'linear-gradient(180deg, #6f8fa8 0%, #b9cddb 65%, #e9f2f6 100%)'
    : 'linear-gradient(180deg, #8ecbf2 0%, #c9e8fb 65%, #e9f6ff 100%)';

  document.getElementById('content').className = '';
  document.getElementById('content').innerHTML = `
    <div class="clock">${time}<span class="ampm"> ${ampm}</span></div>
    <div class="date">${weekday}, ${day} de ${month}</div>

    <div class="light-wrap">
      <div class="light ${decision.level}">${EMOJI_BY_LEVEL[decision.level]}</div>
    </div>

    <div class="message ${decision.level}">${msg.emoji} ${msg.title}</div>
    <div class="submessage">${msg.sub}</div>

    <div class="temp-row">
      <span class="icon">🌡️</span>
      <span>${temp}°C</span>
    </div>

    <div class="place">Mallorca</div>
  `;
}

async function tick(){
  try{
    const temp = await loadWeather();
    render(temp);
  }catch(e){
    document.getElementById('content').innerHTML =
      '<div class="loading">No se pudo cargar el tiempo 😕<br>¡Inténtalo otra vez!</div>';
  }
}

tick();
setInterval(tick, 5 * 60 * 1000); // refresh every 5 min
</script>

</body>
</html>
