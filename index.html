<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>TRAZO — Completa el logo</title>
<meta name="description" content="Cada día un logo al que le falta una pieza. Dibújala hasta que encaje.">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0a0a;--fg:#fff;--dim:#6b6b6b;--line:#222;--card:#131313}
html,body{height:100%}
body{background:var(--bg);color:var(--fg);font-family:Inter,system-ui,sans-serif;overflow:hidden}
.screen{position:fixed;inset:0;display:none;flex-direction:column;padding:env(safe-area-inset-top) 20px calc(env(safe-area-inset-bottom) + 20px);overflow-y:auto}
.screen.on{display:flex}
.bebas{font-family:'Bebas Neue',sans-serif;letter-spacing:2px}

/* AUTH */
#auth{align-items:center;justify-content:center;gap:0;text-align:center}
#auth h1{font-family:'Bebas Neue';font-size:76px;letter-spacing:8px;line-height:1}
#auth .sub{color:var(--dim);font-size:14px;margin-top:6px;margin-bottom:44px;max-width:280px}
.btn{width:100%;max-width:340px;border:0;border-radius:14px;padding:16px;font-family:'Bebas Neue';font-size:20px;letter-spacing:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px}
.btn.w{background:#fff;color:#000}
.btn.o{background:transparent;color:#fff;border:1px solid var(--line)}
.btn.g{background:transparent;color:var(--dim);border:0;font-size:13px;font-family:Inter;letter-spacing:0;text-decoration:underline}
.stack{display:flex;flex-direction:column;gap:10px;align-items:center;width:100%}
input{width:100%;max-width:340px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;color:#fff;font-size:16px;font-family:Inter;outline:none}
input:focus{border-color:#444}
.msg{font-size:13px;color:var(--dim);min-height:18px;margin-top:4px}
.sep{color:#3a3a3a;font-size:11px;letter-spacing:2px;margin:16px 0 6px}

/* HOME */
.hdr{display:flex;justify-content:space-between;align-items:center;padding:16px 0 22px;flex:0 0 auto}
.hdr .logo{font-family:'Bebas Neue';font-size:30px;letter-spacing:4px}
.who{font-size:12px;color:var(--dim);display:flex;align-items:center;gap:10px}
.who b{color:#fff;font-weight:600}
.link{color:var(--dim);font-size:12px;background:none;border:0;text-decoration:underline;cursor:pointer;padding:0}
.daily{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:22px;margin-bottom:14px}
.daily .tag{font-size:10px;letter-spacing:3px;color:var(--dim);text-transform:uppercase}
.daily h2{font-family:'Bebas Neue';font-size:40px;letter-spacing:2px;margin:6px 0 2px;line-height:1}
.daily p{font-size:13px;color:var(--dim);margin-bottom:18px}
.daily .done{display:flex;gap:22px;margin-bottom:18px}
.daily .done div{font-size:11px;color:var(--dim);letter-spacing:1px}
.daily .done div b{display:block;font-family:'Bebas Neue';font-size:26px;color:#fff;letter-spacing:1px}
.strip{display:flex;gap:10px;margin-bottom:26px}
.stat{flex:1;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;text-align:center}
.stat b{display:block;font-family:'Bebas Neue';font-size:28px;letter-spacing:1px}
.stat span{font-size:10px;color:var(--dim);letter-spacing:2px;text-transform:uppercase}
.h3{font-size:11px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-bottom:12px}
.cats{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding-bottom:20px}
.cat{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;text-align:left;cursor:pointer;color:#fff}
.cat b{font-family:'Bebas Neue';font-size:24px;letter-spacing:1px;display:block}
.cat span{font-size:11px;color:var(--dim)}
.bar{height:3px;background:#242424;border-radius:3px;margin-top:10px;overflow:hidden}
.bar i{display:block;height:100%;background:#fff;width:0}
.wrap{max-width:460px;width:100%;margin:0 auto}

/* GAME */
#game{padding:env(safe-area-inset-top) 16px calc(env(safe-area-inset-bottom) + 16px);justify-content:center}
.gtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.gtop .mid{font-size:11px;letter-spacing:3px;color:var(--dim);text-transform:uppercase}
.gtop .t{font-family:'Bebas Neue';font-size:22px;letter-spacing:1px;min-width:56px;text-align:right}
.stage{position:relative;width:100%;aspect-ratio:1;background:#fff;border-radius:22px;overflow:hidden;touch-action:none;user-select:none}
.stage.bad{animation:sh .3s}
.stage.bad::after{content:'';position:absolute;inset:0;background:#ff3b30;opacity:.16;pointer-events:none}
@keyframes sh{20%{transform:translateX(-8px)}60%{transform:translateX(8px)}}
canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
#full{opacity:0;transition:opacity .5s ease}
#full.show{opacity:1}
#flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none}
#flash.go{animation:fl .55s ease-out}
@keyframes fl{0%{opacity:.95}100%{opacity:0}}
.won{position:absolute;inset:auto 0 0 0;padding:26px 20px 22px;background:linear-gradient(transparent,rgba(0,0,0,.8));opacity:0;transition:opacity .5s;pointer-events:none;text-align:center}
.won.show{opacity:1}
.won b{font-family:'Bebas Neue';font-size:44px;letter-spacing:3px;display:block;line-height:1}
.won span{font-size:12px;color:#bbb;letter-spacing:2px}
.hint{text-align:center;font-size:12px;color:#4a4a4a;padding:14px 0;min-height:40px}
.gbar{display:flex;gap:10px}
.gbar button{flex:1;border-radius:14px;padding:15px;font-family:'Bebas Neue';font-size:19px;letter-spacing:2px;cursor:pointer;border:0}
.gbar .p{background:#fff;color:#000}
.gbar .s{background:transparent;color:var(--dim);border:1px solid var(--line)}

/* RANK */
.row{display:flex;align-items:center;gap:14px;padding:14px 4px;border-bottom:1px solid #191919}
.row .n{font-family:'Bebas Neue';font-size:20px;color:var(--dim);width:26px}
.row .nm{flex:1;font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row .ms{font-family:'Bebas Neue';font-size:20px;letter-spacing:1px}
.row.me{background:#161616;border-radius:10px;padding-left:10px;padding-right:10px}
.row.me .n{color:#fff}
.empty{color:var(--dim);font-size:13px;text-align:center;padding:50px 0}
.back{background:none;border:0;color:var(--dim);font-size:13px;cursor:pointer;padding:0}
</style>
</head>
<body>

<!-- ══ AUTH ══ -->
<section class="screen on" id="auth">
  <h1>TRAZO</h1>
  <div class="sub">Cada día un logo al que le falta una pieza. Dibújala hasta que encaje.</div>
  <div class="stack">
    <button class="btn w" id="bGoogle">

      Entrar con Google
    </button>
    <div class="sep">O</div>
    <input id="email" type="email" inputmode="email" placeholder="tu@email.com" autocomplete="email">
    <button class="btn o" id="bMagic">Enviarme un enlace</button>
    <div class="msg" id="authMsg"></div>
    <button class="btn g" id="bGuest">Entrar sin cuenta</button>
  </div>
</section>

<!-- ══ HOME ══ -->
<section class="screen" id="home">
  <div class="wrap">
    <div class="hdr">
      <div class="logo">TRAZO</div>
      <div class="who"><b id="uName">—</b><button class="link" id="bOut">Salir</button></div>
    </div>

    <div class="daily" id="dailyCard">
      <div class="tag">Reto de hoy</div>
      <h2 id="dailyTitle">Logo del día</h2>
      <p id="dailyDesc">Mismo logo para todos. Solo cuenta el primer intento.</p>
      <div class="done" id="dailyDone" style="display:none">
        <div>Tiempo<b id="dMs">—</b></div>
        <div>Fallos<b id="dFails">—</b></div>
      </div>
      <button class="btn w" id="bDaily" style="max-width:none">Jugar</button>
    </div>

    <div class="strip">
      <div class="stat"><b id="sStreak">0</b><span>Racha</span></div>
      <div class="stat"><b id="sSolved">0</b><span>Resueltos</span></div>
      <div class="stat" id="sRankBox" style="cursor:pointer"><b id="sRank">—</b><span>Ranking</span></div>
    </div>

    <div class="h3">Categorías</div>
    <div class="cats" id="cats"></div>
  </div>
</section>

<!-- ══ GAME ══ -->
<section class="screen" id="game">
  <div class="wrap">
    <div class="gtop">
      <button class="back" id="bBack">← Volver</button>
      <div class="mid" id="gCat">—</div>
      <div class="t" id="gTime">0.0</div>
    </div>
    <div class="stage" id="stage">
      <canvas id="base"></canvas>
      <canvas id="ink"></canvas>
      <canvas id="full"></canvas>
      <div id="flash"></div>
      <div class="won" id="won"><b id="wonName"></b><span id="wonSub"></span></div>
    </div>
    <div class="hint" id="hint">Dibuja la pieza que falta</div>
    <div class="gbar">
      <button class="s" id="bUndo">Deshacer</button>
      <button class="p" id="bNext">Siguiente</button>
    </div>
  </div>
</section>

<!-- ══ RANK ══ -->
<section class="screen" id="rank">
  <div class="wrap">
    <div class="hdr">
      <button class="back" id="bBack2">← Volver</button>
      <div class="logo" style="font-size:22px">RANKING</div>
    </div>
    <div class="h3" id="rankDay">Hoy</div>
    <div id="rankList"><div class="empty">Cargando…</div></div>
  </div>
</section>

/* ════════ ESTADO ════════ */
const M = 300, S = 640;

let mode = 'cat';           // 'cat' | 'daily'

let target, allowed, drawn, targetCount = 0;

function show(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on')); $(id).classList.add('on'); }
function today(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function dailyLogo(){ const k=today(); let h=2166136261; for(let i=0;i<k.length;i++){h^=k.charCodeAt(i);h=Math.imul(h,16777619);} return LOGOS[(h>>>0)%LOGOS.length]; }
function fmt(ms){ return (ms/1000).toFixed(1)+'s'; }
const LS = { get:k=>{try{return JSON.parse(localStorage.getItem(k))}catch(e){return null}}, set:(k,v)=>localStorage.setItem(k,JSON.stringify(v)) };
function doneList(){ return LS.get('trazo_done') || []; }
function markDone(id){ const d=doneList(); if(!d.includes(id)){ d.push(id); LS.set('trazo_done',d); } }

/* ════════ AUTH ════════ */
$('bGoogle').onclick = async ()=>{
  const { error } = await sb.auth.signInWithOAuth({ provider:'google', options:{ redirectTo: location.origin } });
  if(error) $('authMsg').textContent = error.message;
};
$('bMagic').onclick = async ()=>{
  const email = $('email').value.trim();
  if(!email) { $('authMsg').textContent='Escribe tu email.'; return; }
  $('authMsg').textContent = 'Enviando…';
  const { error } = await sb.auth.signInWithOtp({ email, options:{ emailRedirectTo: location.origin } });
  $('authMsg').textContent = error ? error.message : 'Revisa tu correo.';
};
$('bGuest').onclick = ()=>{ guest = true; user = null; enterHome(); };
$('bOut').onclick = async ()=>{ await sb.auth.signOut(); guest=false; user=null; show('auth'); };

sb.auth.onAuthStateChange((_e, s)=>{ if(s?.user){ user = s.user; guest=false; enterHome(); } });
(async ()=>{ const { data } = await sb.auth.getSession(); if(data.session?.user){ user = data.session.user; enterHome(); } })();

function displayName(){
  if(guest || !user) return 'Invitado';
  return user.user_metadata?.full_name || user.user_metadata?.name || (user.email||'').split('@')[0];
}

async function enterHome(){
  show('home');
  $('uName').textContent = displayName();
  $('bOut').style.display = guest ? 'none' : '';

  const L = dailyLogo();
  $('dailyTitle').textContent = 'Reto de hoy';
  $('dailyDesc').textContent = 'Mismo logo para todos. Solo cuenta el primer intento.';

  // categorías
  $('cats').innerHTML = '';
  const done = doneList();
  CATS.forEach(c=>{
    const all = LOGOS.filter(l=>l.cat===c.id);
    const n = all.filter(l=>done.includes(l.id)).length;
    const el = document.createElement('button');
    el.className='cat';
    el.innerHTML = `<b>${c.name}</b><span>${n} / ${all.length}</span><div class="bar"><i style="width:${all.length?n/all.length*100:0}%"></i></div>`;
    el.onclick = ()=>startCat(c.id);
    $('cats').appendChild(el);
  });
  $('sSolved').textContent = done.length;

  // reto ya hecho?
  let myRow = null;
  if(user){
    const { data } = await sb.from('trazo_daily').select('*').eq('user_id', user.id).eq('day', today()).maybeSingle();
    myRow = data;
  }
  if(myRow){
    $('dailyDone').style.display='flex';
    $('dMs').textContent = fmt(myRow.ms);
    $('dFails').textContent = myRow.fails;
    $('bDaily').textContent = 'Ver ranking';
    $('bDaily').onclick = openRank;
  } else {
    $('dailyDone').style.display='none';
    $('bDaily').textContent = 'Jugar';
    $('bDaily').onclick = startDaily;
  }

  // racha + puesto
  $('sStreak').textContent = user ? await streak() : 0;
  $('sRank').textContent = '—';
  if(user && myRow){
    const { data } = await sb.from('trazo_daily').select('user_id,ms').eq('day', today()).order('ms',{ascending:true});
    if(data){ const i = data.findIndex(r=>r.user_id===user.id); if(i>=0) $('sRank').textContent = '#'+(i+1); }
  }
}
$('sRankBox').onclick = openRank;

async function streak(){
  const { data } = await sb.from('trazo_daily').select('day').eq('user_id', user.id).order('day',{ascending:false});
  if(!data?.length) return 0;
  const days = data.map(r=>r.day);
  let n=0; const d=new Date();
  for(;;){
    const k = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    if(days.includes(k)){ n++; d.setDate(d.getDate()-1); }
    else if(n===0 && k===today()){ d.setDate(d.getDate()-1); }
    else break;
  }
  return n;
}

/* ════════ MOTOR ════════ */
function svgURL(inner){
  return 'data:image/svg+xml;charset=utf-8,'+encodeURIComponent(
    `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">${inner}</svg>`);
}
function load(inner){ return new Promise(r=>{ const i=new Image(); i.onload=()=>r(i); i.src=svgURL(inner); }); }

function dilate(src, rad){
  const a=new Uint8Array(M*M), b=new Uint8Array(M*M);
  for(let y=0;y<M;y++)for(let x=0;x<M;x++){let v=0;for(let k=-rad;k<=rad;k++){const xx=x+k;if(xx>=0&&xx<M&&src[y*M+xx]){v=1;break;}}a[y*M+x]=v;}
  for(let x=0;x<M;x++)for(let y=0;y<M;y++){let v=0;for(let k=-rad;k<=rad;k++){const yy=y+k;if(yy>=0&&yy<M&&a[yy*M+x]){v=1;break;}}b[y*M+x]=v;}
  return b;
}
function maskImg(img){
  const c=document.createElement('canvas'); c.width=c.height=M;
  const x=c.getContext('2d'); x.drawImage(img,0,0,M,M);
  const d=x.getImageData(0,0,M,M).data, m=new Uint8Array(M*M);
  for(let i=0;i<M*M;i++) m[i]= d[i*4+3]>100 ? 1:0;
  return m;
}
function maskStroke(pts){
  const c=document.createElement('canvas'); c.width=c.height=M;
  const x=c.getContext('2d'), k=M/S;
  x.lineWidth=BRUSH*k; x.lineCap='round'; x.lineJoin='round'; x.strokeStyle='#000';
  x.beginPath(); x.moveTo(pts[0].x*k, pts[0].y*k);
  for(const p of pts) x.lineTo(p.x*k, p.y*k);
  if(pts.length===1) x.lineTo(pts[0].x*k+.1, pts[0].y*k);
  x.stroke();
  const d=x.getImageData(0,0,M,M).data, m=new Uint8Array(M*M);
  for(let i=0;i<M*M;i++) m[i]= d[i*4+3]>60 ? 1:0;
  return m;
}
function ching(){
  try{
    const a=new (window.AudioContext||window.webkitAudioContext)();
    [784,1175].forEach((f,i)=>{
      const o=a.createOscillator(), g=a.createGain();
      o.type='sine'; o.frequency.value=f;
      const t=a.currentTime+i*.09;
      g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(.22,t+.01);
      g.gain.exponentialRampToValueAtTime(.001,t+.55);
      o.connect(g); g.connect(a.destination); o.start(t); o.stop(t+.6);
    });
  }catch(e){}
}
function paintInk(){
  const x=cInk.getContext('2d'); x.clearRect(0,0,S,S);
  x.lineWidth=BRUSH; x.lineCap='round'; x.lineJoin='round'; x.strokeStyle='#181818';
  const all = cur ? strokes.concat([cur]) : strokes;
  for(const st of all){ x.beginPath(); x.moveTo(st[0].x,st[0].y); for(const p of st) x.lineTo(p.x,p.y); x.stroke(); }
}

async function loadLogo(){
  const L = queue[qi];
  solved=false; strokes=[]; cur=null; fails=0;
  drawn = new Uint8Array(M*M);
  $('won').classList.remove('show'); cFull.classList.remove('show');
  $('hint').textContent='Dibuja la pieza que falta';
  $('gCat').textContent = mode==='daily' ? 'Reto de hoy' : (CATS.find(c=>c.id===L.cat)||{}).name;
  $('bNext').style.visibility = 'hidden';

  const [b,p,f] = await Promise.all([ load(L.base), load(L.piece), load(L.base+L.piece) ]);
  [cBase,cInk,cFull].forEach(c=>{ c.width=S; c.height=S; c.getContext('2d').clearRect(0,0,S,S); });
  cBase.getContext('2d').drawImage(b,0,0,S,S);
  cFull.getContext('2d').drawImage(f,0,0,S,S);

  target = maskImg(p);
  allowed = dilate(target, TOL);
  targetCount = target.reduce((a,b)=>a+b,0);

  t0 = Date.now();
  clearInterval(timer);
  timer = setInterval(()=>{ if(!solved) $('gTime').textContent = ((Date.now()-t0)/1000).toFixed(1); }, 100);
}

function endStroke(){
  if(!cur || cur.length<2){ cur=null; paintInk(); return; }
  const sm = maskStroke(cur);
  let tot=0, out=0;
  for(let i=0;i<M*M;i++) if(sm[i]){ tot++; if(!allowed[i]) out++; }

  if(tot===0 || out/tot > MAX_OUT){        // mal → se borra la línea
    cur=null; paintInk(); fails++;
    stage.classList.add('bad'); setTimeout(()=>stage.classList.remove('bad'),300);
    return;
  }
  strokes.push(cur); cur=null; paintInk();
  for(let i=0;i<M*M;i++) if(sm[i]) drawn[i]=1;

  const fat = dilate(drawn, 5);
  let hit=0; for(let i=0;i<M*M;i++) if(target[i] && fat[i]) hit++;
  if(hit/targetCount >= WIN_COVER) win();
}

async function win(){
  solved = true; clearInterval(timer);
  const ms = Date.now()-t0;
  const L = queue[qi];
  ching();
  $('flash').classList.remove('go'); void $('flash').offsetWidth; $('flash').classList.add('go');
  cFull.classList.add('show');
  $('wonName').textContent = L.name;
  $('wonSub').textContent = fmt(ms) + (fails ? ' · ' + fails + ' fallos' : ' · sin fallos');
  $('won').classList.add('show');
  $('hint').textContent = '';
  setTimeout(()=>cInk.getContext('2d').clearRect(0,0,S,S), 550);
  markDone(L.id);

  if(mode==='daily' && user){
    await sb.from('trazo_daily').insert({
      user_id:user.id, day:today(), logo:L.id, ms, fails, name:displayName()
    });
    $('bNext').textContent='Ver ranking';
  } else {
    $('bNext').textContent = (qi < queue.length-1) ? 'Siguiente' : 'Terminar';
  }
  $('bNext').style.visibility='visible';
}

/* dibujo */
function pos(e){
  const r = stage.getBoundingClientRect();
  return { x:(e.clientX-r.left)*(S/r.width), y:(e.clientY-r.top)*(S/r.height) };
}
stage.addEventListener('pointerdown', e=>{ if(solved) return; e.preventDefault(); stage.setPointerCapture(e.pointerId); drawing=true; cur=[pos(e)]; paintInk(); });
stage.addEventListener('pointermove', e=>{ if(!drawing||solved) return; e.preventDefault(); cur.push(pos(e)); paintInk(); });
stage.addEventListener('pointerup',   e=>{ if(!drawing||solved) return; e.preventDefault(); drawing=false; endStroke(); });
stage.addEventListener('pointercancel', ()=>{ if(drawing){ drawing=false; cur=null; paintInk(); } });

$('bUndo').onclick = ()=>{ if(solved) return; strokes.pop(); drawn=new Uint8Array(M*M);
  for(const st of strokes){ const m=maskStroke(st); for(let i=0;i<M*M;i++) if(m[i]) drawn[i]=1; }
  paintInk(); };
$('bNext').onclick = ()=>{
  if(mode==='daily'){ openRank(); return; }
  if(qi < queue.length-1){ qi++; loadLogo(); } else { clearInterval(timer); enterHome(); }
};
$('bBack').onclick = ()=>{ clearInterval(timer); enterHome(); };
$('bBack2').onclick = enterHome;

function startCat(cid){
  const done = doneList();
  const all = LOGOS.filter(l=>l.cat===cid);
  const pend = all.filter(l=>!done.includes(l.id));
  queue = pend.length ? pend : all;
  qi = 0; mode='cat'; show('game'); loadLogo();
}
function startDaily(){ queue=[dailyLogo()]; qi=0; mode='daily'; show('game'); loadLogo(); }

/* ════════ RANKING ════════ */
async function openRank(){
  show('rank'); clearInterval(timer);
  $('rankDay').textContent = 'Hoy — ' + dailyLogo().name;
  const { data, error } = await sb.from('trazo_daily').select('user_id,name,ms,fails').eq('day', today()).order('ms',{ascending:true}).limit(50);
  const box = $('rankList');
  if(error || !data?.length){ box.innerHTML = '<div class="empty">Nadie lo ha resuelto todavía hoy.<br>Sé el primero.</div>'; return; }
  box.innerHTML = '';
  data.forEach((r,i)=>{
    const d = document.createElement('div');
    d.className = 'row' + (user && r.user_id===user.id ? ' me' : '');
    d.innerHTML = `<div class="n">${i+1}</div><div class="nm">${(r.name||'Anónimo')}</div><div class="ms">${fmt(r.ms)}</div>`;
    box.appendChild(d);
  });
}
</script>
