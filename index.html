<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#101014">
<title>TRAZO · el juego diario de banderas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --void:#101014; --surface:#191921; --raise:#22222C; --edge:#2E2E3A;
  --text:#F3F2EF; --dim:#8B8998; --paper:#FFFFFF;
  --spark:#F5D90A; --ink-on-spark:#101014;
  --ok:#3DD68C; --no:#FF6B5A;
  --r:18px; --nav:74px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--void)}
body{color:var(--text);font-family:'IBM Plex Sans',system-ui,sans-serif;font-size:16px;line-height:1.45;
  max-width:560px;margin:0 auto;overscroll-behavior:none;
  padding:0 18px calc(var(--nav) + 28px + env(safe-area-inset-bottom))}
h1,h2,h3{margin:0;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;letter-spacing:-.02em;line-height:1.02}
button{font:inherit;color:inherit;border:none;background:none;cursor:pointer}
input{font:inherit}
.mono{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.04em;text-transform:uppercase}
.dim{color:var(--dim)}

.wordmark{display:inline-flex;align-items:center;gap:1px;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;letter-spacing:-.03em;line-height:1}
.wordmark .ring{display:block;color:var(--spark);transition:color .5s}

header{display:flex;align-items:center;justify-content:space-between;padding:20px 0 18px}
header .wordmark{font-size:27px}
.streak{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--edge);border-radius:999px;padding:8px 14px;font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:500}
.streak b{color:var(--spark);transition:color .5s}

nav{position:fixed;left:0;right:0;bottom:0;z-index:50;display:flex;justify-content:center;
  background:rgba(16,16,20,.86);backdrop-filter:blur(18px);border-top:1px solid var(--edge);
  padding:10px 12px calc(10px + env(safe-area-inset-bottom))}
nav .inner{display:flex;width:100%;max-width:560px}
nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;padding:6px 0;color:var(--dim);border-radius:12px}
nav button svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
nav button span{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase}
nav button[aria-current="page"]{color:var(--text)}
nav button[aria-current="page"] svg{stroke:var(--spark)}

/* ══ LOGIN ══ */
.login{min-height:100svh;display:flex;flex-direction:column;justify-content:center;gap:26px;padding:40px 0}
.login .wordmark{font-size:56px;align-self:flex-start}
.login h1{font-size:40px;max-width:12ch}
.login p{color:var(--dim);margin:0;max-width:34ch}
.swatchrow{display:flex;gap:7px;margin:6px 0 2px}
.swatchrow img{flex:1;width:0;aspect-ratio:3/2;border-radius:8px;object-fit:cover;filter:blur(2px)}
.authbtn{display:flex;align-items:center;justify-content:center;gap:11px;width:100%;background:var(--text);color:var(--void);border-radius:14px;padding:16px;font-weight:600}
.authbtn.alt{background:transparent;color:var(--text);border:1px solid var(--edge)}
.authbtn:active{transform:scale(.985)}
.authbtn svg{width:19px;height:19px}
.guest{width:100%;text-align:center;color:var(--dim);padding:10px;font-size:14px;text-decoration:underline;text-underline-offset:3px}
.legal{color:#5D5B69;font-size:12px;text-align:center;line-height:1.5}

/* ══ EVENTO ══ */
.event{background:#fff;color:#101014;border-radius:var(--r);overflow:hidden;margin-bottom:14px;border:1px solid var(--edge)}
.event .strip{display:flex;height:56px;overflow:hidden}
.event .strip img{flex:1;width:0;height:100%;object-fit:cover;filter:blur(3.5px)}
.event .body{display:flex;align-items:center;gap:12px;padding:16px 18px 18px}
.event .txt{flex:1;min-width:0}
.event .kick{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#B58900;font-weight:500}
.event h3{font-size:25px;margin:3px 0 3px}
.event .sub{color:#6C6A78;font-size:13px}
.event .go{background:#F1EFEA;color:#101014;border-radius:11px;padding:12px 16px;font-weight:600;white-space:nowrap;display:flex;gap:7px;align-items:center}
.event .go:active{transform:scale(.96)}
.evbar{height:4px;background:#E7E5E0}
.evbar i{display:block;height:100%;background:#101014}

/* ══ HOY ══ */
.hero{position:relative;overflow:hidden;border-radius:var(--r);padding:22px;
  background:var(--spark);color:var(--ink-on-spark);margin-bottom:14px;transition:background .5s,color .5s}
.hero .grid-bg{position:absolute;inset:0;opacity:.14;
  background-image:linear-gradient(currentColor 1px,transparent 1px),linear-gradient(90deg,currentColor 1px,transparent 1px);
  background-size:26px 26px;pointer-events:none}
.hero .tag{display:inline-block;border:1px solid currentColor;border-radius:999px;padding:4px 10px;margin-bottom:14px;opacity:.75}
.hero h2{font-size:44px;margin-bottom:6px}
.hero .sub{opacity:.8;font-size:14px;margin-bottom:18px}
.hero .cta{display:flex;align-items:center;justify-content:space-between;width:100%;background:var(--ink-on-spark);color:var(--spark);border-radius:12px;padding:15px 18px;font-weight:600;transition:background .5s,color .5s}
.hero .cta:active{transform:scale(.985)}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:26px}
.stat{background:var(--surface);border:1px solid var(--edge);border-radius:14px;padding:14px 12px;text-align:center}
.stat b{display:block;font-family:'Bricolage Grotesque',sans-serif;font-size:26px;font-weight:800}
.stat span{color:var(--dim);font-size:11px;font-family:'IBM Plex Mono',monospace;letter-spacing:.06em;text-transform:uppercase}

/* ══ MODOS ══ */
.modes{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.mode{background:var(--surface);border:1px solid var(--edge);border-radius:16px;padding:15px;text-align:left;position:relative;overflow:hidden}
.mode:active{transform:scale(.97)}
.mode .mi{width:22px;height:22px;stroke:var(--spark);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;transition:stroke .5s}
.mode b{display:block;font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:17px;margin-top:10px}
.mode span{color:var(--dim);font-size:12px;line-height:1.35;display:block;margin-top:2px}
.mode .rec{position:absolute;top:13px;right:14px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--dim)}

/* ══ NIVELES ══ */
.levels{display:flex;gap:6px;overflow-x:auto;margin:0 -18px 20px;padding:0 18px 4px;scrollbar-width:none}
.levels::-webkit-scrollbar{display:none}
.lv{flex-shrink:0;background:var(--surface);border:1px solid var(--edge);border-radius:999px;padding:9px 15px;
  font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.05em;text-transform:uppercase;color:var(--dim)}
.lv[aria-pressed="true"]{background:var(--text);color:var(--void);border-color:var(--text)}

/* ══ COLECCIONES ══ */
.section-title{display:flex;align-items:baseline;justify-content:space-between;margin:26px 0 12px}
.section-title h3{font-size:22px}
.packs{display:flex;flex-direction:column;gap:10px}
.pack{display:flex;align-items:center;gap:14px;width:100%;text-align:left;background:var(--surface);border:1px solid var(--edge);border-radius:var(--r);padding:12px}
.pack:active{transform:scale(.985)}
.pack .cover{width:62px;height:62px;flex-shrink:0;border-radius:10px;overflow:hidden;
  display:grid;grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(3,1fr);background:#0E0E13}
.pack .cover img{width:100%;height:100%;object-fit:cover;filter:blur(2.6px);display:block}
.pack h4{margin:0;font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:17px}
.pack .meta{color:var(--dim);font-size:13px;line-height:1.35}
.pack .arrow{margin-left:auto;color:var(--dim);font-size:20px}
.pack .pill{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--dim);text-align:right;line-height:1.6}

.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.tile{position:relative;overflow:hidden;border-radius:14px;padding:14px;aspect-ratio:1/1;display:flex;flex-direction:column;justify-content:space-between;text-align:left;border:1px solid rgba(255,255,255,.08)}
.tile:active{transform:scale(.97)}
.tile .ico{width:34%;align-self:flex-start;opacity:.9}
.tile .ico svg{width:100%;display:block;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.tile .name{font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:16px;line-height:1.15}
.tile .hex{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.06em;opacity:.72;margin-top:2px}
.tile .dif{position:absolute;top:10px;right:11px;font-family:'IBM Plex Mono',monospace;font-size:10px;opacity:.72}
.tile .best{position:absolute;bottom:12px;right:12px;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:15px;opacity:.9}
.search{width:100%;background:var(--surface);border:1px solid var(--edge);border-radius:12px;padding:14px 16px;color:var(--text);margin-bottom:14px}
.search::placeholder{color:var(--dim)}

/* ══ PINTAR ══ */
.back{display:inline-flex;align-items:center;gap:7px;color:var(--dim);padding:6px 0;margin-bottom:12px;font-size:14px}
.brief{margin-bottom:14px}
.brief h2{font-size:40px;margin-top:6px}
.brief .line{display:flex;align-items:center;gap:10px;margin-top:10px;color:var(--dim)}
.gauge{display:inline-flex;gap:3px}
.gauge i{width:6px;height:6px;border-radius:50%;background:var(--edge)}
.gauge i.on{background:var(--spark);transition:background .5s}
.clock{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:500;color:var(--text)}
.clock.hot{color:var(--no)}

.stage{position:relative;background:var(--paper);border-radius:10px;overflow:hidden;aspect-ratio:3/2;width:100%;
  box-shadow:0 0 0 6px #fff, 0 0 0 7px var(--edge), 0 22px 50px -30px var(--spark);transition:box-shadow .5s}
#pad,#ghost{position:absolute;inset:0;width:100%;height:100%;display:block}
#ghost{z-index:1;opacity:0;transition:opacity .4s;filter:blur(15px);transform:scale(1.08)}
#ghost.on{opacity:.42}
#pad{z-index:2;touch-action:none}

.hints{display:flex;gap:7px;margin:20px 0 6px}
.hint{flex:1;background:var(--surface);border:1px solid var(--edge);border-radius:12px;padding:11px 6px;text-align:center;line-height:1.25}
.hint b{display:block;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--no);margin-top:3px}
.hint span{font-size:12px;font-weight:500}
.hint:disabled{opacity:.35}
.hintout{color:var(--dim);font-size:13px;min-height:20px;margin-bottom:10px}
.locked{background:var(--surface);border:1px dashed var(--edge);border-radius:12px;padding:11px;text-align:center;color:var(--dim);font-size:12px;margin:20px 0 10px;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.06em}

.swatches{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.sw{width:38px;height:38px;border-radius:10px;border:2px solid var(--edge);position:relative}
.sw[aria-pressed="true"]{outline:2px solid var(--text);outline-offset:2px}
.sw.rainbow{background:conic-gradient(#f43,#f93,#fd3,#3d8,#39d,#73d,#f43)}
.sw input{position:absolute;inset:0;opacity:0;width:100%;height:100%;border:none;padding:0}

.tools{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}
.tool{width:42px;height:42px;border-radius:11px;background:var(--surface);border:1px solid var(--edge);display:flex;align-items:center;justify-content:center}
.tool svg{width:19px;height:19px;stroke:var(--text);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.tool[aria-pressed="true"]{background:var(--spark);border-color:var(--spark);transition:background .4s}
.tool[aria-pressed="true"] svg{stroke:var(--ink-on-spark)}
.tool.push{margin-left:auto}
.tool:disabled{opacity:.35}
.size{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.size input{flex:1;accent-color:var(--spark)}
.size b{width:32px;text-align:right;font-family:'IBM Plex Mono',monospace;font-size:13px}

.primary{width:100%;background:var(--text);color:var(--void);border-radius:14px;padding:17px;font-weight:600;font-size:17px}
.primary:active{transform:scale(.99)}
.ghostbtn{width:100%;background:transparent;border:1px solid var(--edge);border-radius:14px;padding:15px;font-weight:500;margin-top:10px;color:var(--text)}

/* ══ RESULTADO ══ */
.result{background:var(--surface);border:1px solid var(--edge);border-radius:var(--r);padding:24px 18px;text-align:center}
.verdict{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:26px;line-height:1.1;margin-bottom:20px;min-height:30px}
.versus{display:flex;flex-direction:column;gap:14px;margin-bottom:18px}
.versus figure{margin:0}
.versus canvas,.versus img{width:100%;aspect-ratio:3/2;background:#fff;border-radius:10px;display:block;object-fit:cover;box-shadow:0 0 0 4px #fff}
.versus figcaption{color:var(--dim);font-size:12px;margin-top:10px;font-family:'IBM Plex Mono',monospace;letter-spacing:.05em;text-transform:uppercase}
.score{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:64px;line-height:1}
.score small{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--dim);display:block;letter-spacing:.08em;text-transform:uppercase;margin-top:2px}
.judge{color:var(--dim);font-size:12px;font-family:'IBM Plex Mono',monospace;margin:14px 0 20px;letter-spacing:.04em}
.judge em{font-style:normal;color:var(--no)}
.tally{display:flex;justify-content:center;gap:20px;margin-bottom:18px;color:var(--dim);font-family:'IBM Plex Mono',monospace;font-size:12px;text-transform:uppercase;letter-spacing:.06em}
.tally b{display:block;font-family:'Bricolage Grotesque',sans-serif;font-size:24px;color:var(--text);letter-spacing:0}

/* ══ RANKING ══ */
.notice{background:var(--surface);border:1px dashed var(--edge);border-radius:14px;padding:14px;color:var(--dim);font-size:13px;margin-bottom:16px;line-height:1.5}
.rank{display:flex;flex-direction:column;gap:8px}
.row{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--edge);border-radius:14px;padding:13px 15px}
.row.me{border-color:var(--spark);transition:border-color .5s}
.row .pos{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--dim);width:26px}
.row.top .pos{color:var(--spark)}
.row .who{font-weight:500;flex:1}
.row .pct{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:19px}

/* ══ PERFIL ══ */
.avatar{width:62px;height:62px;border-radius:50%;background:var(--spark);color:var(--ink-on-spark);display:flex;align-items:center;justify-content:center;
  font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:25px;transition:background .5s}
.me-row{display:flex;align-items:center;gap:16px;margin-bottom:24px}
.me-row h2{font-size:26px}
.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.slot{aspect-ratio:3/2;border-radius:10px;border:1px dashed var(--edge);display:flex;align-items:center;justify-content:center;color:#4A4856;font-size:22px;overflow:hidden;position:relative}
.slot img{width:100%;height:100%;object-fit:cover}
.slot .p{position:absolute;right:5px;bottom:4px;background:rgba(16,16,20,.8);color:#fff;border-radius:5px;padding:1px 5px;font-family:'IBM Plex Mono',monospace;font-size:10px}

.center{text-align:center;color:var(--dim);padding:60px 20px;line-height:1.6}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>

function paletaReal(img, n = 6){
  const c = Object.assign(document.createElement('canvas'), {width:120, height:80});
  const x = c.getContext('2d', {willReadFrequently:true});
  x.drawImage(img, 0, 0, 120, 80);
  const d = x.getImageData(0,0,120,80).data, map = {};
  for(let i = 0; i < 9600; i++){
    if(d[i*4+3] < 200) continue;
    const k = [0,1,2].map(j => Math.min(Math.round(d[i*4+j]/36)*36, 255)).join(',');
    map[k] = (map[k]||0) + 1;
  }
  return Object.entries(map).sort((a,b) => b[1]-a[1]).slice(0,n)
    .map(([k]) => '#' + k.split(',').map(v => (+v).toString(16).padStart(2,'0')).join(''));
}

/* ── juez 1 · color, celda a celda ────────────────────────────── */
const GX = 72, GY = 48;
function aRejilla(src, blanco){
  const c = Object.assign(document.createElement('canvas'), {width:GX, height:GY});
  const x = c.getContext('2d', {willReadFrequently:true});
  x.imageSmoothingEnabled = false;
  if(blanco){ x.fillStyle = '#fff'; x.fillRect(0,0,GX,GY); }
  x.drawImage(src, 0, 0, GX, GY);
  return x.getImageData(0,0,GX,GY).data;
}
function notaGeo(crudo, img){
  const T = GX*GY;
  const tinta = aRejilla(crudo, false);   // alfa: dónde has pintado de verdad
  const mio   = aRejilla(crudo, true);    // tu bandera, ya sobre el papel blanco
  const real  = aRejilla(img,  true);

  let hay = 0, ok = 0, debe = 0, hecho = 0;
  for(let i = 0; i < T; i++){
    const j = i*4;
    if(tinta[j+3] > 60) hay++;

    /* el blanco del papel YA cuenta como blanco */
    const dd = Math.abs(mio[j]-real[j]) + Math.abs(mio[j+1]-real[j+1]) + Math.abs(mio[j+2]-real[j+2]);
    if(dd < 150) ok++;

    /* lo que en la bandera real NO es blanco, hay que pintarlo sí o sí */
    const claro = real[j] > 215 && real[j+1] > 215 && real[j+2] > 215;
    if(!claro){ debe++; if(tinta[j+3] > 60) hecho++; }
  }
  if(hay / T < .04) return 0;                       // lienzo vacío = 0, sin regalos
  const acierto   = ok / T;
  const cobertura = debe ? Math.min(1, (hecho / debe) / .85) : 1;
  return Math.min(99, Math.round(100 * Math.pow(acierto, 1.3) * cobertura));
}

const API = 'https://api.anthropic.com/v1/messages';
async function juezIA(dibujo, code, geo, img){
  const W2 = 480, H2 = 320;
  const mk = () => Object.assign(document.createElement('canvas'), {width:W2, height:H2});
  const a = mk(), ax = a.getContext('2d'); ax.fillStyle='#fff'; ax.fillRect(0,0,W2,H2); ax.drawImage(dibujo,0,0,W2,H2);
  const b = mk(); b.getContext('2d').drawImage(img,0,0,W2,H2);
  const png = cv => ({type:'image', source:{type:'base64', media_type:'image/png', data: cv.toDataURL('image/png').split(',')[1]}});

  const res = await fetch(API, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({model:'claude-sonnet-4-6', max_tokens:1000, messages:[{role:'user', content:[
      png(a), png(b),
      {type:'text', text:
`Eres el juez de un juego en el que la gente pinta banderas de memoria, con el dedo, en un móvil.
Imagen 1: la bandera del jugador. Imagen 2: la bandera real de ${nombre(code)}.

Puntúa de 0 a 100. Criterios por orden de peso:
- Colores: ¿son los correctos?
- Composición: ¿franjas horizontales, verticales, cruz, cuadrante? ¿en el orden correcto?
- Proporciones de las bandas.
- Escudos y símbolos finos casi no cuentan: es un dedo sobre un cristal, no Illustrator.

Calibración: 0 = vacío. 40 = colores bien, composición mal. 70 = se reconoce el país. 90 = clavada, para estar hecha a mano.
Referencia automática de color: ${geo}. Tenla en cuenta, pero manda tu criterio.

Devuelve SOLO este JSON, sin markdown:
{"nota": <0-100>, "veredicto": "<frase corta en español, con guasa, máx 8 palabras>"}`}
    ]}]})
  });
  const data = await res.json();
  const txt = data.content.filter(c => c.type === 'text').map(c => c.text).join('');
  const j = JSON.parse(txt.replace(/```json|```/g,'').trim());
  return {nota: Math.max(0, Math.min(100, Math.round(j.nota))), veredicto: j.veredicto};
}

    <div class="modes">
      ${MODOS.map(m => `<button class="mode" data-modo="${m.id}">
        ${m.id==='crono' ? `<div class="rec">${+(store.get('rec_crono')||0)}</div>` : ''}
        ${m.id==='vida'  ? `<div class="rec">${+(store.get('rec_vida')||0)}</div>` : ''}
        <svg class="mi" viewBox="0 0 24 24"><path d="${m.svg}"/></svg>
        <b>${m.nombre}</b><span>${m.desc}</span>
      </button>`).join('')}
    </div>

    <div class="section-title"><h3>Colecciones</h3><span class="mono dim">${PACKS.length}</span></div>
    <div class="packs">${PACKS.slice(0,3).map(tarjetaPack).join('')}</div>
    <button class="ghostbtn" id="mas" style="margin-top:12px">Ver todas las colecciones</button>`);

  document.getElementById('jugar').onclick = () => dibujar(c, 'Reto del día', null, true);
  document.getElementById('mas').onclick = () => { tab='packs'; pintar(); };
  const eg = document.getElementById('evGo');
  if(eg) eg.onclick = () => {
    const pend = EVENTO.codes.filter(x => record(x) < 60);
    const cola = barajar(pend.length ? pend : EVENTO.codes);
    arrancar(cola, EVENTO.nombre, 'libre');
  };
  root.querySelectorAll('[data-modo]').forEach(b => b.onclick = () => {
    const m = b.dataset.modo;
    const cola = barajar(filtrar(todas(), nivel));
    arrancar(cola, MODO[m].nombre, m);
  });
  engancharPacks();
}

/* Portada: banderas reales, pero borrosas. Se intuyen, no se copian. */
const portada = codes => `<div class="cover">${
  codes.slice(0,6).map(c => `<img src="${url(c,'w80')}" alt="">`).join('')
}</div>`;

const tarjetaPack = p => {
  const v = deLaPack(p), n = v.filter(c => record(c) >= 60).length;
  return `<button class="pack" data-pack="${p.id}">
    ${portada(barajar(v))}
    <div><h4>${p.nombre}</h4><div class="meta">${v.length} banderas · ${p.desc}</div></div>
    <div class="pill">${n}/${v.length}<br>→</div>
  </button>`;
};
const engancharPacks = () => root.querySelectorAll('[data-pack]').forEach(b => b.onclick = () => {
  const p = PACKS.find(x => x.id === b.dataset.pack);
  const cola = barajar(filtrar(deLaPack(p), nivel));
  if(!cola.length) return;
  arrancar(cola, p.nombre, 'libre');
});

/* ═══ COLECCIONES ═════════════════════════════════════════════ */
let nivel = store.get('nivel') || 'todo';
function vistaPacks(){
  marco(`
    <div class="section-title" style="margin-top:0"><h3>Colecciones</h3></div>
    <div class="levels">
      ${NIVELES.map(([k,t]) => `<button class="lv" data-lv="${k}" aria-pressed="${k===nivel}">${t}</button>`).join('')}
    </div>
    <div class="packs">
      ${PACKS.map(p => ({p, v: filtrar(deLaPack(p), nivel)})).filter(o => o.v.length)
        .map(({p,v}) => {
          const n = v.filter(c => record(c) >= 60).length;
          return `<button class="pack" data-pack="${p.id}">
            ${portada(barajar(v))}
            <div><h4>${p.nombre}</h4><div class="meta">${v.length} banderas · ${p.desc}</div></div>
            <div class="pill">${n}/${v.length}<br>→</div></button>`;
        }).join('')}
    </div>
    <button class="ghostbtn" id="explorar" style="margin-top:12px">Buscar entre las ${FLAGS.length} banderas</button>`);

  root.querySelectorAll('.lv').forEach(b => b.onclick = () => { nivel = b.dataset.lv; store.set('nivel', nivel); vistaPacks(); });
  document.getElementById('explorar').onclick = vistaBuscar;
  engancharPacks();
}

function vistaBuscar(){
  pantalla(`
    <button class="back" id="volver">← Colecciones</button>
    <div class="brief"><div class="mono dim">Catálogo completo</div><h2>${FLAGS.length} banderas</h2>
      <div class="line">Busca un país y píntalo. No verás la bandera hasta el final.</div></div>
    <input id="q" class="search" placeholder="Busca un país…" autocomplete="off">
    <div class="grid" id="res"></div>`);
  document.getElementById('volver').onclick = () => { tab='packs'; pintar(); };

  const q = document.getElementById('q'), res = document.getElementById('res');
  const pinta = () => {
    const t = q.value.trim().toLowerCase();
    const hit = FLAGS.filter(f => !t || f.n.toLowerCase().includes(t)).sort((a,b) => a.n.localeCompare(b.n));
    res.innerHTML = hit.length ? hit.map(f => chip(f.c)).join('')
      : `<div class="center" style="grid-column:1/-1">Ningún país con ese nombre.</div>`;
    res.querySelectorAll('.tile').forEach(b => b.onclick = () => arrancar([b.dataset.c], 'Catálogo', 'libre'));
  };
  q.oninput = pinta; pinta();
}

const chip = c => {
  const col = color(c), t = sobre(col), r = record(c);
  return `<button class="tile" data-c="${c}" style="background:${col};color:${t}">
    <div class="ico">${BANDERITA}</div>
    <div class="mono dif">${dif(c)}/10</div>
    ${r ? `<div class="best">${r}%</div>` : ''}
    <div><div class="name">${nombre(c)}</div><div class="hex">${col.toUpperCase()}</div></div>
  </button>`;
};

/* ═══ SESIÓN ══════════════════════════════════════════════════ */
const W = 900, H = 600;
let ses = null, relojGlobal = null;

function arrancar(cola, etiqueta, modo){
  ses = {cola, i:0, etiqueta, modo, notas:[], fin: MODO[modo].seg ? Date.now() + MODO[modo].seg*1000 : null};
  dibujar(cola[0], etiqueta, ses, false);
}

/* ═══ PINTAR ══════════════════════════════════════════════════ */
function dibujar(code, etiqueta, sesion, esDiario){
  clearInterval(relojGlobal);
  const marca = color(code);
  teñir(marca);
  const modo = sesion ? sesion.modo : 'libre';
  const sinPistas = modo === 'duro';
  const paleta = [marca, ...PALETA.filter(x => x.toLowerCase() !== marca.toLowerCase())].slice(0,8);
  let castigo = 0, img = null;

  pantalla(`
    <button class="back" id="volver">← Salir</button>
    <div class="brief">
      <div class="mono dim">Pinta la bandera de</div>
      <h2>${nombre(code)}</h2>
      <div class="line">
        <span class="mono">${etiqueta}${sesion && sesion.cola.length > 1 ? ` · ${sesion.i+1}/${sesion.cola.length}` : ''}</span>
        <span class="gauge">${Array.from({length:10},(_,i)=>`<i class="${i<dif(code)?'on':''}"></i>`).join('')}</span>
        ${sesion?.fin ? '<span class="clock" id="clk">—</span>' : ''}
      </div>
    </div>

    <div class="stage">
      <canvas id="ghost" width="${W}" height="${H}"></canvas>
      <canvas id="pad"   width="${W}" height="${H}"></canvas>
    </div>

    ${sinPistas ? '<div class="locked">Modo estricto · sin pistas</div>' : `
    <div class="hints">
      <button class="hint" data-h="1"><span>Datos</span><b>−5%</b></button>
      <button class="hint" data-h="2"><span>Colores reales</span><b>−10%</b></button>
      <button class="hint" data-h="3"><span>Bandera borrosa</span><b>−20%</b></button>
    </div>`}
    <div class="hintout" id="hintout"></div>

    <div class="swatches" id="sw">
      ${paleta.map((x,i) => `<button class="sw" data-c="${x}" aria-pressed="${i===0}" style="background:${x}" aria-label="Color ${x}"></button>`).join('')}
      <button class="sw rainbow" id="custom" aria-label="Color libre"><input type="color" value="${marca}"></button>
    </div>

    <div class="tools" id="tools">
      ${[['brush','M3 21c3 .5 5-1 6-3M8 17 18 6a2.1 2.1 0 0 1 3 3L10 19'],
         ['fill','M4 12 12 4l8 8-8 8zM20 15c1.5 2 1.5 4 0 4s-1.5-2 0-4'],
         ['eraser','M4 16 12 8l6 6-4 4H6zM9 21h11'],
         ['rect','M4 7h16v10H4z'],
         ['circle','M12 4a8 8 0 1 0 0 16 8 8 0 0 0 0-16'],
         ['line','M5 19 19 5']
       ].map(([t,d],i) => `<button class="tool" data-t="${t}" aria-pressed="${i===0}"><svg viewBox="0 0 24 24"><path d="${d}"/></svg></button>`).join('')}
      <button class="tool push" id="undo" disabled><svg viewBox="0 0 24 24"><path d="M9 14 4 9l5-5M4 9h10a6 6 0 0 1 0 12h-3"/></svg></button>
      <button class="tool" id="clear"><svg viewBox="0 0 24 24"><path d="M4 7h16M9 7V5h6v2M6 7l1 13h10l1-13"/></svg></button>
    </div>

    <div class="size">
      <span class="mono dim">Grosor</span>
      <input id="sz" type="range" min="6" max="180" value="70"><b id="szN">70</b>
    </div>

    <button class="primary" id="revelar">Revelar y comparar</button>`);

  document.getElementById('volver').onclick = () => { clearInterval(relojGlobal); ses = null; teñir('#F5D90A'); pintar(); };

  /* reloj de contrarreloj */
  if(sesion?.fin){
    const clk = document.getElementById('clk');
    const tic = () => {
      const s = Math.max(0, Math.ceil((sesion.fin - Date.now())/1000));
      clk.textContent = `${String((s/60)|0).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
      clk.classList.toggle('hot', s <= 15);
      if(s <= 0){ clearInterval(relojGlobal); resumen(); }
    };
    tic(); relojGlobal = setInterval(tic, 250);
  }

  cargarBandera(code).then(i => { img = i; }).catch(() => {
    document.getElementById('hintout').textContent = 'No se ha podido cargar la bandera. Revisa la conexión.';
  });

  const out = document.getElementById('hintout');
  const gh = document.getElementById('ghost');
  const swBox = document.getElementById('sw');
  let c = marca;
  const elegir = b => { swBox.querySelectorAll('.sw').forEach(o => o.setAttribute('aria-pressed','false')); b.setAttribute('aria-pressed','true'); };

  root.querySelectorAll('.hint').forEach(b => b.onclick = () => {
    const h = +b.dataset.h;
    if(!img) return out.textContent = 'Un segundo, cargando la bandera…';
    b.disabled = true;
    if(h === 1){
      castigo += 5;
      out.textContent = `${CONTINENTES[FLAG[code].k]} · ${nColores(img)} colores dominantes · dificultad ${dif(code)}/10.`;
    }
    if(h === 2){
      castigo += 10;
      const cols = paletaReal(img, 6);
      swBox.querySelectorAll('.sw[data-c]').forEach(e => e.remove());
      cols.slice().reverse().forEach((col,i) => {
        const s = document.createElement('button');
        s.className = 'sw'; s.dataset.c = col; s.style.background = col;
        s.setAttribute('aria-pressed', String(i === cols.length-1));
        s.onclick = () => { elegir(s); c = col; };
        swBox.prepend(s);
      });
      c = cols[0];
      out.textContent = 'Paleta real cargada. Los colores son estos y no otros.';
    }
    if(h === 3){
      castigo += 20;
      gh.getContext('2d').drawImage(img, 0, 0, W, H);
      gh.classList.add('on');
      out.textContent = 'Bandera borrosa activada. Calca sin vergüenza.';
    }
  });

  /* lienzo */
  const cv = document.getElementById('pad'), ctx = cv.getContext('2d',{willReadFrequently:true});
  ctx.lineCap = ctx.lineJoin = 'round';
  let herr = 'brush', grosor = 70, pintando = false, x0 = 0, y0 = 0, antes = null;
  const pila = [], undo = document.getElementById('undo');
  const snap = () => { pila.push(ctx.getImageData(0,0,W,H)); if(pila.length>12) pila.shift(); undo.disabled = false; };
  undo.onclick = () => { if(pila.length){ ctx.putImageData(pila.pop(),0,0); undo.disabled = !pila.length; } };
  document.getElementById('clear').onclick = () => { snap(); ctx.clearRect(0,0,W,H); };

  swBox.querySelectorAll('.sw[data-c]').forEach(b => b.onclick = () => { elegir(b); c = b.dataset.c; });
  document.querySelector('#custom input').oninput = e => { elegir(document.getElementById('custom')); c = e.target.value; };

  const tb = document.getElementById('tools');
  tb.querySelectorAll('[data-t]').forEach(b => b.onclick = () => {
    tb.querySelectorAll('[data-t]').forEach(o => o.setAttribute('aria-pressed','false'));
    b.setAttribute('aria-pressed','true'); herr = b.dataset.t;
  });
  const sz = document.getElementById('sz');
  sz.oninput = () => { grosor = +sz.value; document.getElementById('szN').textContent = grosor; };

  const pos = e => { const r = cv.getBoundingClientRect(); return [(e.clientX-r.left)*W/r.width, (e.clientY-r.top)*H/r.height]; };

  function relleno(px, py, hex){
    const im = ctx.getImageData(0,0,W,H), d = im.data;
    const p0 = (py|0)*W + (px|0), i0 = p0*4;
    const dst = [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
    const src = [d[i0], d[i0+1], d[i0+2], d[i0+3]];
    const st = [p0], visto = new Uint8Array(W*H);
    while(st.length){
      const p = st.pop(); if(visto[p]) continue; visto[p] = 1;
      const i = p*4;
      const dd = Math.abs(d[i]-src[0]) + Math.abs(d[i+1]-src[1]) + Math.abs(d[i+2]-src[2]) + Math.abs(d[i+3]-src[3]);
      if(dd > 60) continue;
      d[i]=dst[0]; d[i+1]=dst[1]; d[i+2]=dst[2]; d[i+3]=255;
      const x = p % W, y = (p-x)/W;
      if(x>0) st.push(p-1);
      if(x<W-1) st.push(p+1);
      if(y>0) st.push(p-W);
      if(y<H-1) st.push(p+W);
    }
    ctx.putImageData(im,0,0);
  }

  cv.addEventListener('pointerdown', e => {
    e.preventDefault(); cv.setPointerCapture(e.pointerId);
    const [x,y] = pos(e); snap();
    if(herr === 'fill'){ relleno(x,y,c); return; }
    pintando = true; x0 = x; y0 = y;
    if(herr === 'brush' || herr === 'eraser'){
      ctx.globalCompositeOperation = herr === 'eraser' ? 'destination-out' : 'source-over';
      ctx.strokeStyle = ctx.fillStyle = c; ctx.lineWidth = grosor;
      ctx.beginPath(); ctx.arc(x,y,grosor/2,0,7); ctx.fill();
      ctx.beginPath(); ctx.moveTo(x,y);
    } else antes = ctx.getImageData(0,0,W,H);
  });
  cv.addEventListener('pointermove', e => {
    if(!pintando) return;
    const [x,y] = pos(e);
    if(herr === 'brush' || herr === 'eraser'){ ctx.lineTo(x,y); ctx.stroke(); return; }
    ctx.putImageData(antes,0,0);
    ctx.globalCompositeOperation = 'source-over';
    ctx.strokeStyle = ctx.fillStyle = c; ctx.lineWidth = grosor;
    if(herr === 'rect') ctx.fillRect(Math.min(x0,x), Math.min(y0,y), Math.abs(x-x0), Math.abs(y-y0));
    if(herr === 'circle'){ ctx.beginPath(); ctx.ellipse((x0+x)/2,(y0+y)/2,Math.abs(x-x0)/2,Math.abs(y-y0)/2,0,0,7); ctx.fill(); }
    if(herr === 'line'){ ctx.beginPath(); ctx.moveTo(x0,y0); ctx.lineTo(x,y); ctx.stroke(); }
  });
  const soltar = () => { pintando = false; antes = null; ctx.globalCompositeOperation = 'source-over'; };
  cv.addEventListener('pointerup', soltar);
  cv.addEventListener('pointercancel', soltar);

  document.getElementById('revelar').onclick = () => {
    if(!img) return out.textContent = 'Espera un segundo: aún se está cargando la bandera.';
    clearInterval(relojGlobal);
    const geo = notaGeo(cv, img);
    const plano = Object.assign(document.createElement('canvas'), {width:W, height:H});
    const px = plano.getContext('2d'); px.fillStyle = '#fff'; px.fillRect(0,0,W,H); px.drawImage(cv,0,0);
    if(esDiario) sumarRacha();
    resultado(code, geo, castigo, plano, img, sesion, esDiario);
  };
}

/* ═══ RESULTADO ═══════════════════════════════════════════════ */
function resultado(code, geo, castigo, dibujo, img, sesion, esDiario){
  const modo = sesion ? sesion.modo : 'libre';
  const mult = MODO[modo]?.mult || 1;
  const ini = Math.min(99, Math.round(Math.max(0, geo - castigo) * mult));
  const corte = MODO[modo]?.corte;
  const muere = corte !== undefined && ini < corte;
  const hay = sesion && sesion.i + 1 < sesion.cola.length && !muere && (!sesion.fin || Date.now() < sesion.fin);

  pantalla(`
    <button class="back" id="volver">← Salir</button>
    <section class="result">
      <div class="verdict" id="vd">${muere ? 'Hasta aquí. Fuera.' : veredictoLocal(ini)}</div>
      <div class="versus">
        <figure><canvas id="tuyo" width="${W}" height="${H}"></canvas><figcaption>La tuya</figcaption></figure>
        <figure><img src="${url(code)}" alt=""><figcaption>${nombre(code)}</figcaption></figure>
      </div>
      <div class="score" id="sc" style="color:var(--spark)">${ini}<small>% de acierto</small></div>
      <div class="judge" id="jz">${esDiario ? 'El juez está mirando tu bandera…'
        : `Color ${geo}${castigo?` · pistas −${castigo}`:''}${mult>1?` · estricto ×${mult}`:''}`}</div>
      <button class="primary" id="sig">${hay ? 'Siguiente bandera' : (sesion && sesion.notas.length ? 'Ver resumen' : 'Volver')}</button>
      <button class="ghostbtn" id="share">Compartir resultado</button>
    </section>`);

  document.getElementById('tuyo').getContext('2d').drawImage(dibujo, 0, 0, W, H);
  let nota = ini, frase = muere ? 'Hasta aquí. Fuera.' : veredictoLocal(ini);
  guardarRecord(code, nota);
  if(sesion) sesion.notas.push({code, nota});

  document.getElementById('volver').onclick = () => { ses = null; teñir('#F5D90A'); pintar(); };
  document.getElementById('sig').onclick = () => {
    if(hay){ sesion.i++; dibujar(sesion.cola[sesion.i], sesion.etiqueta, sesion, false); }
    else if(sesion && sesion.notas.length) resumen();
    else { ses = null; teñir('#F5D90A'); pintar(); }
  };
  document.getElementById('share').onclick = () => compartir(code, nota, frase, dibujo, img);

  if(!esDiario || geo === 0) return;
  (async () => {
    const jz = document.getElementById('jz');
    try{
      const r = await juezIA(dibujo, code, geo, img);
      nota = Math.max(0, r.nota - castigo); frase = r.veredicto; guardarRecord(code, nota);
      document.getElementById('sc').innerHTML = `${nota}<small>% de acierto</small>`;
      document.getElementById('vd').textContent = frase;
      jz.innerHTML = `Juez IA ${r.nota} · color ${geo}${castigo ? ` · pistas <em>−${castigo}</em>` : ''}`;
    }catch(e){
      jz.innerHTML = `Solo color ${geo}${castigo ? ` · pistas <em>−${castigo}</em>` : ''} · el juez IA no responde`;
    }
  })();
}

/* ═══ RESUMEN DE SESIÓN ═══════════════════════════════════════ */
function resumen(){
  clearInterval(relojGlobal);
  const s = ses; if(!s) return pintar();
  const n = s.notas.length;
  const media = n ? Math.round(s.notas.reduce((a,b) => a+b.nota, 0)/n) : 0;
  const mejor = n ? Math.max(...s.notas.map(x => x.nota)) : 0;

  if(s.modo === 'crono' && n > +(store.get('rec_crono')||0)) store.set('rec_crono', n);
  if(s.modo === 'vida'  && n > +(store.get('rec_vida') ||0)) store.set('rec_vida',  n);

  teñir('#F5D90A');
  pantalla(`
    <button class="back" id="volver">← Salir</button>
    <div class="brief"><div class="mono dim">${s.etiqueta}</div><h2>Se acabó</h2></div>
    <section class="result">
      <div class="tally">
        <div>Banderas<b>${n}</b></div>
        <div>Media<b>${media}%</b></div>
        <div>Mejor<b>${mejor}%</b></div>
      </div>
      <div class="gallery">${s.notas.slice(-9).map(x =>
        `<div class="slot"><img src="${url(x.code,'w160')}" alt=""><div class="p">${x.nota}%</div></div>`).join('')}</div>
      <button class="primary" id="otra" style="margin-top:20px">Otra ronda</button>
      <button class="ghostbtn" id="fin">Volver al inicio</button>
    </section>`);

  const salir = () => { ses = null; tab='hoy'; pintar(); };
  document.getElementById('volver').onclick = salir;
  document.getElementById('fin').onclick = salir;
  document.getElementById('otra').onclick = () => arrancar(barajar(filtrar(todas(), nivel)), s.etiqueta, s.modo);
}

/* ═══ COMPARTIR ═══════════════════════════════════════════════ */
async function compartir(code, nota, frase, dibujo, img){
  const CW = 1080, CH = 1350, marca = color(code), t = sobre(marca);
  const cn = Object.assign(document.createElement('canvas'), {width:CW, height:CH});
  const x = cn.getContext('2d');

  x.fillStyle = marca; x.fillRect(0,0,CW,CH);
  x.fillStyle = t; x.globalAlpha = .12;
  for(let i = 1; i < 20; i++){ x.fillRect(i*54, 0, 1, CH); x.fillRect(0, i*54, CW, 1); }
  x.globalAlpha = 1;

  x.fillStyle = t; x.font = '800 44px "Bricolage Grotesque",sans-serif';
  x.fillText('TRAZO', 70, 105);

  x.fillStyle = '#fff'; x.beginPath(); x.roundRect(60, 160, CW-120, 1000, 34); x.fill();

  x.textAlign = 'center'; x.fillStyle = '#101014';
  x.font = '800 44px "Bricolage Grotesque",sans-serif';
  x.fillText(frase, CW/2, 245);

  const BW = 420, BH = 280, gap = 40, L = (CW - BW*2 - gap)/2, T = 300;
  x.strokeStyle = '#E7E5E0'; x.lineWidth = 2;
  x.drawImage(dibujo, L, T, BW, BH);         x.strokeRect(L, T, BW, BH);
  x.drawImage(img, L + BW + gap, T, BW, BH); x.strokeRect(L + BW + gap, T, BW, BH);

  x.fillStyle = '#8B8998'; x.font = '500 24px "IBM Plex Mono",monospace';
  x.fillText('LA TUYA', L + BW/2, T + BH + 46);
  x.fillText(nombre(code).toUpperCase(), L + BW + gap + BW/2, T + BH + 46);

  x.fillStyle = marca; x.font = '800 190px "Bricolage Grotesque",sans-serif';
  x.fillText(nota + '%', CW/2, T + BH + 300);
  x.fillStyle = '#8B8998'; x.font = '500 26px "IBM Plex Mono",monospace';
  x.fillText('PINTADA DE MEMORIA, CON EL DEDO', CW/2, T + BH + 360);

  const blob = await new Promise(r => cn.toBlob(r, 'image/png'));
  const file = new File([blob], 'trazo.png', {type:'image/png'});
  const texto = `${nota}% pintando la bandera de ${nombre(code)} de memoria. ¿Puedes hacerlo mejor?`;
  try{ if(navigator.canShare?.({files:[file]})){ await navigator.share({files:[file], text:texto}); return; } }
  catch(e){ return; }
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'trazo.png'; a.click();
}

/* ═══ RANKING (maqueta hasta conectar Supabase) ═══════════════ */
function vistaRank(){
  const c = banderaDelDia();
  const yo = usuario();
  const mio = +(store.get('mejor') || 0);
  const falsos = [['martaog',97],['dani_pz',94],['luisss',91],['nachete',88],['cris.m',85],['pablo_v',82],['aina',79]];
  const filas = [...falsos, ...(yo ? [[yo.nombre, mio]] : [])]
    .sort((a,b) => b[1]-a[1])
    .map(([n,p],i) => `<div class="row ${i<3?'top':''} ${yo && n===yo.nombre ? 'me':''}">
      <div class="pos">${String(i+1).padStart(2,'0')}</div>
      <div class="who">${n}</div><div class="pct">${p}%</div></div>`).join('');

  marco(`
    <div class="section-title" style="margin-top:0"><h3>Ranking de hoy</h3>
      <span class="mono dim">${nombre(c)}</span></div>
    <div class="notice">Maqueta. Las posiciones reales llegan cuando conectemos Supabase: una fila por jugador y día, con la nota del juez IA.</div>
    <div class="rank">${filas}</div>
    ${yo ? '' : `<button class="ghostbtn" id="ent" style="margin-top:14px">Crear cuenta para entrar en el ranking</button>`}`);

  const b = document.getElementById('ent');
  if(b) b.onclick = vistaLogin;
}

/* ═══ PERFIL ══════════════════════════════════════════════════ */
function vistaPerfil(){
  const u = usuario();
  if(!u){
    marco(`
      <div class="center" style="padding-top:40px">
        <div style="font-size:46px;margin-bottom:14px;color:var(--spark)">${RING}</div>
        <h3 style="font-size:24px;color:var(--text);margin-bottom:10px">Estás jugando sin cuenta</h3>
        <p style="margin:0 0 22px">Tu racha vive solo en este móvil. Con cuenta la guardas, entras en el ranking y guardas cada bandera.</p>
        <button class="primary" id="ent">Crear cuenta gratis</button>
      </div>`);
    document.getElementById('ent').onclick = vistaLogin;
    return;
  }
  const r = records();
  const top = Object.entries(r).sort((a,b) => b[1]-a[1]).slice(0,9);

  marco(`
    <div class="me-row">
      <div class="avatar">${u.inicial}</div>
      <div><h2>${u.nombre}</h2><div class="mono dim">Racha de ${racha()} días</div></div>
    </div>
    <div class="stats">
      <div class="stat"><b>${racha()}</b><span>Racha</span></div>
      <div class="stat"><b>${hechas()}</b><span>Pintadas</span></div>
      <div class="stat"><b>${+(store.get('mejor')||0)}%</b><span>Récord</span></div>
    </div>
    <div class="stats">
      <div class="stat"><b>${+(store.get('rec_crono')||0)}</b><span>Contrarreloj</span></div>
      <div class="stat"><b>${+(store.get('rec_vida')||0)}</b><span>Supervivencia</span></div>
      <div class="stat"><b>${eventoHechas()}/${EVENTO.codes.length}</b><span>Mundial</span></div>
    </div>
    <div class="section-title"><h3>Tus mejores</h3><span class="mono dim">${hechas()} de ${FLAGS.length}</span></div>
    <div class="gallery">${
      top.length
        ? top.map(([c,n]) => `<div class="slot"><img src="${url(c,'w160')}" alt=""><div class="p">${n}%</div></div>`).join('')
        : Array.from({length:6},()=>'<div class="slot">+</div>').join('')
    }</div>
    <button class="ghostbtn" id="salir" style="margin-top:20px">Cerrar sesión</button>`);

  document.getElementById('salir').onclick = async () => {
    if(sb) await sb.auth.signOut();
    USER = null; store.set('invitado',''); vistaLogin();
  };
}

/* ═══ ARRANQUE ════════════════════════════════════════════════ */
(async () => {
  try{
    if(sb){
      const {data:{session}} = await sb.auth.getSession();
      if(session) USER = perfilDe(session.user);
      sb.auth.onAuthStateChange((_e, s) => {
        USER = s ? perfilDe(s.user) : null;
        if(USER) store.set('invitado','');
        if(USER || invitado()) pintar(); else vistaLogin();
      });
    }
    if(USER || invitado()) pintar(); else vistaLogin();
  }catch(e){
    console.log(e);
    root.innerHTML = '<div class="center">No se ha podido arrancar.<br>Revisa la conexión y recarga.</div>';
  }
})();
</script>
