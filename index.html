<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>¿Cuánto sabes de banderas?</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Pantalla 1: inicio -->
<section id="screen-start" class="screen active">
  <div class="stage">
    <h1 class="app-title">DIBUJA<br>LA BANDERA</h1>
    <p class="app-sub">¿Cuánto te acuerdas de verdad?</p>

    <div class="mode-buttons">
      <button id="btnDaily" class="btn btn-primary btn-big">
        RETO DIARIO <span class="streak-badge" id="streakBadge">🔥 0</span>
      </button>
      <button id="btnLibre" class="btn btn-ghost btn-big">MODO LIBRE</button>
    </div>
    <p class="daily-status" id="dailyStatus"></p>
  </div>
</section>

<!-- Pantalla 2: reveal de país -->
<section id="screen-reveal" class="screen">
  <div class="stage stage-center">
    <p class="reveal-label">EL PAÍS ES</p>
    <h2 id="revealName" class="reveal-name">ESPAÑA</h2>
  </div>
</section>

<!-- Pantalla 3: dibujo -->
<section id="screen-draw" class="screen">
  <div class="draw-wrap">
    <div class="draw-header">
      <div class="timer" id="timerDisplay">30</div>
      <button id="btnListo" class="btn btn-primary">LISTO</button>
    </div>

    <p class="draw-hint">el cuadrado ENTERO es la bandera — pinta hasta el borde</p>
    <div class="canvas-holder">
      <canvas id="drawCanvas"></canvas>
    </div>

    <div class="tools">
      <div class="palette" id="palette"></div>

      <div class="tool-row">
        <label class="brush-label" for="brushSize">grosor</label>
        <input type="range" id="brushSize" min="2" max="28" value="10">
        <button id="btnUndo" class="btn btn-ghost" title="Deshacer">DESHACER</button>
        <button id="btnClear" class="btn btn-ghost" title="Borrar todo">BORRAR TODO</button>
      </div>
    </div>
  </div>
</section>

<!-- Pantalla 4: resultado -->
<section id="screen-result" class="screen">
  <div class="result-card">
    <div class="result-compare">
      <div class="result-col">
        <canvas id="yoursCanvas" class="result-canvas"></canvas>
        <span class="result-caption">TUYO</span>
      </div>
      <div class="result-col">
        <canvas id="flagCanvas" class="result-canvas"></canvas>
        <span class="result-caption" id="countryNameResult">ESPAÑA</span>
      </div>
    </div>

    <div class="verdict-block">
      <div class="verdict" id="verdictText">SOOO GOOD...</div>
      <div class="percent" id="percentText">98% match</div>
      <p class="streak-note" id="streakNote"></p>
    </div>

    <div class="result-actions">
      <button id="btnOtro" class="btn btn-primary">OTRA BANDERA</button>
      <button id="btnCompartir" class="btn btn-ghost">COMPARTIR</button>
    </div>
  </div>
</section>

<canvas id="hiddenFlagCanvas" style="display:none"></canvas>

<script src="flags.js"></script>
<script src="scoring.js"></script>
<script src="app.js"></script>
</body>
</html>
