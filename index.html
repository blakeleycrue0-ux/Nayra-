<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>TRAZO — Pinta la bandera</title>
<meta name="description" content="Cada día una bandera. Píntala de memoria hasta que encaje.">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0a0a;--fg:#fff;--dim:#6b6b6b;--line:#222;--card:#131313}
html,body{height:100%}
body{background:var(--bg);color:var(--fg);font-family:Inter,system-ui,sans-serif;overflow:hidden}
.screen{position:fixed;inset:0;display:none;flex-direction:column;padding:env(safe-area-inset-top) 20px calc(env(safe-area-inset-bottom) + 20px);overflow-y:auto}
.screen.on{display:flex}
.wrap{max-width:460px;width:100%;margin:0 auto}

/* ─ AUTH ─ */
#auth{align-items:center;justify-content:center;text-align:center}
#auth h1{font-family:'Bebas Neue';font-size:76px;letter-spacing:8px;line-height:1}
#auth .sub{color:var(--dim);font-size:14px;margin:6px 0 44px;max-width:290px}
.btn{width:100%;max-width:340px;border:0;border-radius:14px;padding:16px;font-family:'Bebas Neue';font-size:20px;letter-spacing:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px}
.btn.w{background:#fff;color:#000}
.btn.o{background:transparent;color:#fff;border:1px solid var(--line)}
.btn.g{background:none;color:var(--dim);font-size:13px;font-family:Inter;letter-spacing:0;text-decoration:underline;padding:10px}
.stack{display:flex;flex-direction:column;gap:10px;align-items:center;width:100%}
input{width:100%;max-width:340px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;color:#fff;font-size:16px;outline:none}
input:focus{border-color:#444}
.msg{font-size:13px;color:var(--dim);min-height:18px}
.sep{color:#3a3a3a;font-size:11px;letter-spacing:2px;margin:14px 0 4px}

/* ─ HOME ─ */
.hdr{display:flex;justify-content:space-between;align-items:center;padding:16px 0 22px}
.hdr .logo{font-family:'Bebas Neue';font-size:30px;letter-spacing:4px}
.who{font-size:12px;color:var(--dim);display:flex;align-items:center;gap:10px}
.who b{color:#fff;font-weight:600}
.link{color:var(--dim);font-size:12px;background:none;border:0;text-decoration:underline;cursor:pointer}
.daily{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:22px;margin-bottom:14px}
.daily .tag{font-size:10px;letter-spacing:3px;color:var(--dim);text-transform:uppercase}
.daily h2{font-family:'Bebas Neue';font-size:40px;letter-spacing:2px;margin:6px 0 2px;line-height:1}
.daily p{font-size:13px;color:var(--dim);margin-bottom:18px}
.done{display:flex;gap:24px;margin-bottom:18px}
.done div{font-size:11px;color:var(--dim);letter-spacing:1px}
.done div b{display:block;font-family:'Bebas Neue';font-size:26px;color:#fff}
.strip{display:flex;gap:10px;margin-bottom:26px}
.stat{flex:1;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;text-align:center}
.stat b{display:block;font-family:'Bebas Neue';font-size:28px}
.stat span{font-size:10px;color:var(--dim);letter-spacing:2px;text-transform:uppercase}
.h3{font-size:11px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-bottom:12px}
.cats{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding-bottom:24px}
.cat{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;text-align:left;cursor:pointer;color:#fff}
.cat b{font-family:'Bebas Neue';font-size:24px;display:block}
.cat span{font-size:11px;color:var(--dim)}
.bar{height:3px;background:#242424;border-radius:3px;margin-top:10px;overflow:hidden}
.bar i{display:block;height:100%;background:#fff;width:0}

/* ─ GAME ─ */
#game{justify-content:center;padding-left:16px;padding-right:16px}
.gtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.gtop .mid{font-size:11px;letter-spacing:3px;color:var(--dim);text-transform:uppercase}
.gtop .t{font-family:'Bebas Neue';font-size:22px;min-width:56px;text-align:right}
.back{background:none;border:0;color:var(--dim);font-size:13px;cursor:pointer}
.stage{position:relative;width:100%;aspect-ratio:3/2;border-radius:12px;overflow:hidden;background:#fff;
       border:6px solid #fff;box-shadow:0 0 0 1px #2a2a2a;touch-action:none;user-select:none}
canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
#blur{opacity:0;transition:opacity .4s;filter:blur(15px);transform:scale(1.12)}
#blur.on{opacity:.5}
#real{opacity:0;transition:opacity .55s ease}
#real.on{opacity:1}
#flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none}
#flash.go{animation:fl .6s ease-out}
@keyframes fl{0%{opacity:.9}100%{opacity:0}}
.won{position:absolute;left:0;right:0;bottom:0;padding:26px 16px 16px;text-align:center;
     background:linear-gradient(transparent,rgba(0,0,0,.8));opacity:0;transition:opacity .5s;pointer-events:none}
.won.on{opacity:1}
.won b{font-family:'Bebas Neue';font-size:42px;letter-spacing:3px;display:block;line-height:1}
.won span{font-size:12px;color:#bbb;letter-spacing:2px}
.pal{display:flex;gap:8px;justify-content:center;margin-top:16px}
.sw{width:44px;height:44px;border-radius:50%;border:3px solid #222;cursor:pointer;transition:transform .12s}
.sw.on{border-color:#fff;transform:scale(1.14)}
.tools{display:flex;gap:8px;justify-content:center;margin-top:12px}
.sz{width:38px;height:38px;border-radius:10px;background:var(--card);border:1px solid var(--line);color:#777;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sz.on{border-color:#fff;color:#fff}
.sz i{background:currentColor;border-radius:50%;display:block}
.hint{text-align:center;font-size:12px;color:#4a4a4a;padding:14px 0;min-height:40px}
.gbar{display:flex;gap:8px}
.gbar button{flex:1;border:0;border-radius:13px;padding:14px;font-family:'Bebas Neue';font-size:18px;letter-spacing:2px;cursor:pointer}
.gbar .p{background:#fff;color:#000}
.gbar .s{background:transparent;color:var(--dim);border:1px solid var(--line)}

/* ─ RANK ─ */
.row{display:flex;align-items:center;gap:14px;padding:14px 4px;border-bottom:1px solid #191919}
.row .n{font-family:'Bebas Neue';font-size:20px;color:var(--dim);width:26px}
.row .nm{flex:1;font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row .ms{font-family:'Bebas Neue';font-size:20px}
.row.me{background:#161616;border-radius:10px;padding:14px 10px}
.row.me .n{color:#fff}
.empty{color:var(--dim);font-size:13px;text-align:center;padding:50px 0;line-height:1.7}
</style>
</head>
<body>

<!-- ══ AUTH ══ -->
<section class="screen on" id="auth">
  <h1>TRAZO</h1>
  <div class="sub">Cada día una bandera. Píntala de memoria hasta que encaje.</div>
  <div class="stack">
    <button class="btn w" id="bGoogle">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.6l6.7-6.7C35.6 2.6 30.2 0 24 0 14.6 0 6.5 5.4 2.6 13.2l7.8 6.1C12.3 13.2 17.6 9.5 24 9.5z"/><path fill="#4285F4" d="M46.9 24.5c0-1.6-.1-3.2-.4-4.7H24v9h12.9c-.6 3-2.3 5.6-4.9 7.3l7.6 5.9c4.4-4.1 7.3-10.2 7.3-17.5z"/><path fill="#FBBC05" d="M10.4 28.7c-.5-1.5-.8-3-.8-4.7s.3-3.2.8-4.7l-7.8-6.1C1 16.4 0 20.1 0 24s1 7.6 2.6 10.8l7.8-6.1z"/><path fill="#34A853" d="M24 48c6.5 0 11.9-2.1 15.9-5.8l-7.6-5.9c-2.1 1.4-4.8 2.3-8.3 2.3-6.4 0-11.7-3.7-13.6-9.8l-7.8 6.1C6.5 42.6 14.6 48 24 48z"/></svg>
      Entrar con Google
    </button>
    <div class="sep">O</div>
    <input id="email" type="email" inputmode="email" placeholder="tu@email.com" autocomplete="email">
    <button class="btn o" id="bMagic">Enviarme un enlace</button>
    <div class="msg" id="authMsg"></div>
    <button class="btn g" id="bGuest">Entrar sin cuenta</button>
  </div>
</section>

<!-- ══ HOME ══ -->
<section class="screen" id="home">
  <div class="wrap">
    <div class="hdr">
      <div class="logo">TRAZO</div>
      <div class="who"><b id="uName">—</b><button class="link" id="bOut">Salir</button></div>
    </div>

    <div class="daily">
      <div class="tag">Reto de hoy</div>
      <h2>Bandera del día</h2>
      <p>La misma para todos. Solo cuenta el primer intento.</p>
      <div class="done" id="dailyDone" style="display:none">
        <div>Tiempo<b id="dMs">—</b></div>
        <div>Pistas<b id="dHints">—</b></div>
      </div>
      <button class="btn w" id="bDaily" style="max-width:none">Jugar</button>
    </div>

    <div class="strip">
      <div class="stat"><b id="sStreak">0</b><span>Racha</span></div>
      <div class="stat"><b id="sSolved">0</b><span>Banderas</span></div>
      <div class="stat" id="sRankBox" style="cursor:pointer"><b id="sRank">—</b><span>Ranking</span></div>
    </div>

    <div class="h3">Continentes</div>
    <div class="cats" id="cats"></div>
  </div>
</section>

<!-- ══ GAME ══ -->
<section class="screen" id="game">
  <div class="wrap">
    <div class="gtop">
      <button class="back" id="bBack">← Volver</button>
      <div class="mid" id="gCat">—</div>
      <div class="t" id="gTime">0.0</div>
    </div>

    <div class="stage" id="stage">
      <canvas id="blur"></canvas>
      <canvas id="ink"></canvas>
      <canvas id="real"></canvas>
      <div id="flash"></div>
      <div class="won" id="won"><b id="wonName"></b><span id="wonSub"></span></div>
    </div>

    <div class="pal" id="pal"></div>

    <div class="tools">
      <div class="sz" data-s="30"><i style="width:8px;height:8px"></i></div>
      <div class="sz on" data-s="60"><i style="width:14px;height:14px"></i></div>
      <div class="sz" data-s="110"><i style="width:22px;height:22px"></i></div>
    </div>

    <div class="hint" id="hint">Pinta la bandera dentro del marco</div>

    <div class="gbar">
      <button class="s" id="bHint">Pista</button>
      <button class="s" id="bClear">Borrar</button>
      <button class="p" id="bNext">Saltar</button>
    </div>
  </div>
</section>

<!-- ══ RANK ══ -->
<section class="screen" id="rank">
  <div class="wrap">
    <div class="hdr">
      <button class="back" id="bBack2">← Volver</button>
      <div class="logo" style="font-size:22px">RANKING</div>
    </div>
    <div class="h3" id="rankDay">Hoy</div>
    <div id="rankList"><div class="empty">Cargando…</div></div>
  </div>
</section>

<script>
/* ══════ DIFICULTAD ══════ */
const WIN = 0.85;   // % de acierto necesario (baja a .78 si es duro)
const TOL = 75;     // margen de color permitido (sube a 95 si es duro)
/* ═══════════════════════ */

const SUPA_URL = 'https://gdisbjqfaqtljdycxsuv.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkaXNianFmYXF0bGpkeWN4c3V2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4OTY4ODgsImV4cCI6MjA5OTQ3Mjg4OH0.KjO2evw-9ePDsrCJ_OGhve7zZRFRN2PmpV6EYNBiFCQ';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

const CATS = [
  {id:'europa',  name:'Europa'},
  {id:'america', name:'América'},
  {id:'asia',    name:'Asia'},
  {id:'africa',  name:'África'}
];

const FLAGS = [
 {c:'fr',n:'Francia',k:'europa'},   {c:'de',n:'Alemania',k:'europa'},
 {c:'it',n:'Italia',k:'europa'},    {c:'es',n:'España',k:'europa'},
 {c:'pt',n:'Portugal',k:'europa'},  {c:'se',n:'Suecia',k:'europa'},
 {c:'ch',n:'Suiza',k:'europa'},     {c:'gr',n:'Grecia',k:'europa'},
 {c:'pl',n:'Polonia',k:'europa'},   {c:'nl',n:'Países Bajos',k:'europa'},
 {c:'be',n:'Bélgica',k:'europa'},   {c:'ie',n:'Irlanda',k:'europa'},
 {c:'dk',n:'Dinamarca',k:'europa'}, {c:'no',n:'Noruega',k:'europa'},
 {c:'fi',n:'Finlandia',k:'europa'}, {c:'at',n:'Austria',k:'europa'},
 {c:'cz',n:'Chequia',k:'europa'},   {c:'ua',n:'Ucrania',k:'europa'},
 {c:'ro',n:'Rumanía',k:'europa'},   {c:'hu',n:'Hungría',k:'europa'},

 {c:'ca',n:'Canadá',k:'america'},   {c:'mx',n:'México',k:'america'},
 {c:'br',n:'Brasil',k:'america'},   {c:'ar',n:'Argentina',k:'america'},
 {c:'cl',n:'Chile',k:'america'},    {c:'co',n:'Colombia',k:'america'},
 {c:'pe',n:'Perú',k:'america'},     {c:'uy',n:'Uruguay',k:'america'},
 {c:'cu',n:'Cuba',k:'america'},     {c:'jm',n:'Jamaica',k:'america'},

 {c:'jp',n:'Japón',k:'asia'},       {c:'cn',n:'China',k:'asia'},
 {c:'in',n:'India',k:'asia'},       {c:'kr',n:'Corea del Sur',k:'asia'},
 {c:'th',n:'Tailandia',k:'asia'},   {c:'id',n:'Indonesia',k:'asia'},
 {c:'vn',n:'Vietnam',k:'asia'},     {c:'tr',n:'Turquía',k:'asia'},
 {c:'il',n:'Israel',k:'asia'},      {c:'ph',n:'Filipinas',k:'asia'},

 {c:'ng',n:'Nigeria',k:'africa'},   {c:'za',n:'Sudáfrica',k:'africa'},
 {c:'eg',n:'Egipto',k:'africa'},    {c:'ke',n:'Kenia',k:'africa'},
 {c:'ma',n:'Marruecos',k:'africa'}, {c:'gh',n:'Ghana',k:'africa'},
 {c:'et',n:'Etiopía',k:'africa'},   {c:'sn',n:'Senegal',k:'africa'}
];

/* ══════ ESTADO ══════ */
const W=900, H=600, GX=60, GY=40;
const $ = i => document.getElementById(i);
const stage=$('stage'), cInk=$('ink'), cReal=$('real'), cBlur=$('blur');
[cInk,cReal,cBlur].forEach(c=>{c.width=W;c.height=H});

let user=null, guest=false, mode='cat';
let queue=[], qi=0, flagImg=null, grid=null;
let color='#000', size=60, drawing=false, solved=false, last=null;
let t0=0, timer=null, hints=0;

const show = id => { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on')); $(id).classList.add('on'); };
const today = () => { const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); };
const fmt = ms => (ms/1000).toFixed(1)+'s';
const LS = { get:k=>{try{return JSON.parse(localStorage.getItem(k))}catch(e){return null}}, set:(k,v)=>localStorage.setItem(k,JSON.stringify(v)) };
const done = () => LS.get('trazo_flags') || [];
const markDone = c => { const d=done(); if(!d.includes(c)){ d.push(c); LS.set('trazo_flags',d); } };
function dailyFlag(){ const k=today(); let h=2166136261; for(let i=0;i<k.length;i++){h^=k.charCodeAt(i);h=Math.imul(h,16777619);} return FLAGS[(h>>>0)%FLAGS.length]; }

/* ══════ AUTH ══════ */
$('bGoogle').onclick = async ()=>{
  const {error} = await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:location.origin}});
  if(error) $('authMsg').textContent = error.message;
};
$('bMagic').onclick = async ()=>{
  const email = $('email').value.trim();
  if(!email){ $('authMsg').textContent='Escribe tu email.'; return; }
  $('authMsg').textContent='Enviando…';
  const {error} = await sb.auth.signInWithOtp({email,options:{emailRedirectTo:location.origin}});
  $('authMsg').textContent = error ? error.message : 'Revisa tu correo.';
};
$('bGuest').onclick = ()=>{ guest=true; user=null; enterHome(); };
$('bOut').onclick   = async ()=>{ await sb.auth.signOut(); guest=false; user=null; show('auth'); };
sb.auth.onAuthStateChange((_e,s)=>{ if(s?.user){ user=s.user; guest=false; enterHome(); } });
(async()=>{ const {data}=await sb.auth.getSession(); if(data.session?.user){ user=data.session.user; enterHome(); } })();
const who = () => guest||!user ? 'Invitado' : (user.user_metadata?.full_name || user.user_metadata?.name || (user.email||'').split('@')[0]);

/* ══════ HOME ══════ */
async function enterHome(){
  show('home');
  clearInterval(timer);
  $('uName').textContent = who();
  $('bOut').style.display = guest ? 'none' : '';

  const d = done();
  $('cats').innerHTML='';
  CATS.forEach(c=>{
    const all = FLAGS.filter(f=>f.k===c.id);
    const n = all.filter(f=>d.includes(f.c)).length;
    const el = document.createElement('button');
    el.className='cat';
    el.innerHTML = `<b>${c.name}</b><span>${n} / ${all.length}</span><div class="bar"><i style="width:${n/all.length*100}%"></i></div>`;
    el.onclick = ()=>startCat(c.id);
    $('cats').appendChild(el);
  });
  $('sSolved').textContent = d.length;

  let mine=null;
  if(user){
    const {data} = await sb.from('trazo_daily').select('*').eq('user_id',user.id).eq('day',today()).maybeSingle();
    mine = data;
  }
  if(mine){
    $('dailyDone').style.display='flex';
    $('dMs').textContent = fmt(mine.ms);
    $('dHints').textContent = mine.fails;
    $('bDaily').textContent = 'Ver ranking';
    $('bDaily').onclick = openRank;
  } else {
    $('dailyDone').style.display='none';
    $('bDaily').textContent = 'Jugar';
    $('bDaily').onclick = startDaily;
  }

  $('sStreak').textContent = user ? await streak() : 0;
  $('sRank').textContent = '—';
  if(user && mine){
    const {data} = await sb.from('trazo_daily').select('user_id').eq('day',today()).order('ms',{ascending:true});
    const i = data?.findIndex(r=>r.user_id===user.id);
    if(i>=0) $('sRank').textContent = '#'+(i+1);
  }
}
$('sRankBox').onclick = openRank;

async function streak(){
  const {data} = await sb.from('trazo_daily').select('day').eq('user_id',user.id).order('day',{ascending:false});
  if(!data?.length) return 0;
  const days = data.map(r=>r.day);
  let n=0; const d=new Date();
  for(;;){
    const k = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    if(days.includes(k)){ n++; d.setDate(d.getDate()-1); }
    else if(n===0 && k===today()){ d.setDate(d.getDate()-1); }
    else break;
  }
  return n;
}

/* ══════ MOTOR ══════ */
const loadFlag = code => new Promise((res,rej)=>{
  const i=new Image(); i.crossOrigin='anonymous';
  i.onload=()=>res(i); i.onerror=rej;
  i.src=`https://flagcdn.com/w1280/${code}.png`;
});

function buildGrid(img){
  const c=document.createElement('canvas'); c.width=GX; c.height=GY;
  const x=c.getContext('2d',{willReadFrequently:true});
  x.imageSmoothingEnabled=false; x.drawImage(img,0,0,GX,GY);
  const d=x.getImageData(0,0,GX,GY).data, g=[];
  for(let i=0;i<GX*GY;i++) g.push([d[i*4],d[i*4+1],d[i*4+2]]);
  return g;
}
function palette(img){
  const c=document.createElement('canvas'); c.width=100; c.height=66;
  const x=c.getContext('2d',{willReadFrequently:true}); x.drawImage(img,0,0,100,66);
  const d=x.getImageData(0,0,100,66).data, map={};
  for(let i=0;i<6600;i++){
    const k=[0,1,2].map(j=>Math.min(Math.round(d[i*4+j]/40)*40,255)).join(',');
    map[k]=(map[k]||0)+1;
  }
  return Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([k])=>`rgb(${k})`);
}
function ching(){
  try{
    const a=new (window.AudioContext||window.webkitAudioContext)();
    [784,1175].forEach((f,i)=>{
      const o=a.createOscillator(), g=a.createGain(), t=a.currentTime+i*.09;
      o.type='sine'; o.frequency.value=f;
      g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(.22,t+.01);
      g.gain.exponentialRampToValueAtTime(.001,t+.55);
      o.connect(g); g.connect(a.destination); o.start(t); o.stop(t+.6);
    });
  }catch(e){}
}

function check(){
  const c=document.createElement('canvas'); c.width=GX; c.height=GY;
  const x=c.getContext('2d',{willReadFrequently:true});
  x.imageSmoothingEnabled=false; x.drawImage(cInk,0,0,GX,GY);
  const d=x.getImageData(0,0,GX,GY).data;
  let ok=0;
  for(let i=0;i<GX*GY;i++){
    if(d[i*4+3]<120) continue;
    const [R,G,B]=grid[i];
    if(Math.abs(d[i*4]-R)+Math.abs(d[i*4+1]-G)+Math.abs(d[i*4+2]-B) < TOL*3) ok++;
  }
  if(ok/(GX*GY) >= WIN) win();
}

async function win(){
  solved=true; clearInterval(timer);
  const ms = Date.now()-t0, F = queue[qi];
  ching();
  $('flash').classList.remove('go'); void $('flash').offsetWidth; $('flash').classList.add('go');
  cBlur.classList.remove('on');
  cReal.getContext('2d').drawImage(flagImg,0,0,W,H);
  cReal.classList.add('on');
  $('wonName').textContent = F.n;
  $('wonSub').textContent  = fmt(ms) + (hints ? ' · con pista' : ' · sin pistas');
  $('won').classList.add('on');
  $('hint').textContent='';
  setTimeout(()=>cInk.getContext('2d').clearRect(0,0,W,H), 600);
  markDone(F.c);

  if(mode==='daily' && user){
    await sb.from('trazo_daily').insert({user_id:user.id, day:today(), logo:F.c, ms, fails:hints, name:who()});
    $('bNext').textContent='Ver ranking';
  } else {
    $('bNext').textContent = qi < queue.length-1 ? 'Siguiente' : 'Terminar';
  }
}

async function loadFlagScreen(){
  const F = queue[qi];
  solved=false; last=null; hints=0;
  cInk.getContext('2d').clearRect(0,0,W,H);
  cReal.getContext('2d').clearRect(0,0,W,H);
  cBlur.getContext('2d').clearRect(0,0,W,H);
  cReal.classList.remove('on'); cBlur.classList.remove('on');
  $('won').classList.remove('on');
  $('hint').textContent='Pinta la bandera dentro del marco';
  $('bNext').textContent='Saltar';
  $('gCat').textContent = mode==='daily' ? 'Reto de hoy' : CATS.find(c=>c.id===F.k).name;

  try { flagImg = await loadFlag(F.c); }
  catch(e){ $('hint').textContent='No se pudo cargar la bandera.'; return; }

  grid = buildGrid(flagImg);
  cBlur.getContext('2d').drawImage(flagImg,0,0,W,H);

  const cols = palette(flagImg);
  color = cols[0];
  $('pal').innerHTML='';
  cols.forEach((c,i)=>{
    const s=document.createElement('div');
    s.className='sw'+(i===0?' on':'');
    s.style.background=c;
    s.onclick=()=>{ color=c; document.querySelectorAll('.sw').forEach(e=>e.classList.remove('on')); s.classList.add('on'); };
    $('pal').appendChild(s);
  });

  t0=Date.now(); clearInterval(timer);
  timer=setInterval(()=>{ if(!solved) $('gTime').textContent=((Date.now()-t0)/1000).toFixed(1); },100);
}

/* ── pincel ── */
const pos = e => { const r=stage.getBoundingClientRect(); return {x:(e.clientX-r.left)*(W/r.width), y:(e.clientY-r.top)*(H/r.height)}; };
function draw(a,b){
  const x=cInk.getContext('2d');
  x.strokeStyle=color; x.lineWidth=size; x.lineCap='round'; x.lineJoin='round';
  x.beginPath(); x.moveTo(a.x,a.y); x.lineTo(b.x,b.y); x.stroke();
}
stage.addEventListener('pointerdown',e=>{ if(solved) return; e.preventDefault(); stage.setPointerCapture(e.pointerId); drawing=true; last=pos(e); draw(last,{x:last.x+.1,y:last.y}); });
stage.addEventListener('pointermove',e=>{ if(!drawing||solved) return; e.preventDefault(); const p=pos(e); draw(last,p); last=p; });
stage.addEventListener('pointerup',  e=>{ if(!drawing||solved) return; e.preventDefault(); drawing=false; check(); });
stage.addEventListener('pointercancel',()=>{ drawing=false; });

document.querySelectorAll('.sz').forEach(b=>{
  b.onclick=()=>{ size=+b.dataset.s; document.querySelectorAll('.sz').forEach(e=>e.classList.remove('on')); b.classList.add('on'); };
});
$('bClear').onclick = ()=>{ if(!solved) cInk.getContext('2d').clearRect(0,0,W,H); };
$('bHint').onclick  = ()=>{ if(solved) return; cBlur.classList.toggle('on'); if(cBlur.classList.contains('on')) hints++; };
$('bNext').onclick  = ()=>{
  if(mode==='daily' && solved){ openRank(); return; }
  if(qi < queue.length-1){ qi++; loadFlagScreen(); } else enterHome();
};
$('bBack').onclick  = enterHome;
$('bBack2').onclick = enterHome;

function startCat(k){
  const d = done();
  const all = FLAGS.filter(f=>f.k===k);
  const pend = all.filter(f=>!d.includes(f.c));
  queue = pend.length ? pend : all;
  qi=0; mode='cat'; show('game'); loadFlagScreen();
}
function startDaily(){ queue=[dailyFlag()]; qi=0; mode='daily'; show('game'); loadFlagScreen(); }

/* ══════ RANKING ══════ */
async function openRank(){
  show('rank'); clearInterval(timer);
  $('rankDay').textContent = 'Hoy — ' + dailyFlag().n;
  const {data,error} = await sb.from('trazo_daily').select('user_id,name,ms').eq('day',today()).order('ms',{ascending:true}).limit(50);
  const box = $('rankList');
  if(error || !data?.length){ box.innerHTML='<div class="empty">Nadie la ha pintado todavía hoy.<br>Sé el primero.</div>'; return; }
  box.innerHTML='';
  data.forEach((r,i)=>{
    const d=document.createElement('div');
    d.className='row'+(user && r.user_id===user.id ? ' me' : '');
    d.innerHTML=`<div class="n">${i+1}</div><div class="nm">${r.name||'Anónimo'}</div><div class="ms">${fmt(r.ms)}</div>`;
    box.appendChild(d);
  });
}
</script>
