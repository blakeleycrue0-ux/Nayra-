<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>¿Cuánto sabes del logo?</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Pantalla 1: inicio -->
<section id="screen-start" class="screen active">
  <div class="stage">
    <h1 class="app-title">DIBUJA<br>EL LOGO</h1>
    <p class="app-sub">¿Cuánto te acuerdas de verdad?</p>
    <button id="btnEmpezar" class="btn btn-primary btn-big">EMPEZAR</button>
  </div>
</section>

<!-- Pantalla 2: reveal de marca -->
<section id="screen-reveal" class="screen">
  <div class="stage stage-center">
    <p class="reveal-label">LA MARCA ES</p>
    <h2 id="revealName" class="reveal-name">NIKE</h2>
  </div>
</section>

<!-- Pantalla 3: dibujo -->
<section id="screen-draw" class="screen">
  <div class="draw-wrap">
    <div class="draw-header">
      <div class="timer" id="timerDisplay">30</div>
      <button id="btnListo" class="btn btn-primary">LISTO</button>
    </div>

    <div class="canvas-holder">
      <canvas id="drawCanvas"></canvas>
    </div>

    <div class="tools">
      <div class="palette" id="palette"></div>

      <div class="tool-row">
        <label class="brush-label" for="brushSize">grosor</label>
        <input type="range" id="brushSize" min="2" max="28" value="10">
        <button id="btnUndo" class="btn btn-ghost" title="Deshacer">DESHACER</button>
        <button id="btnClear" class="btn btn-ghost" title="Borrar todo">BORRAR TODO</button>
      </div>
    </div>
  </div>
</section>

<!-- Pantalla 4: resultado -->
<section id="screen-result" class="screen">
  <div class="result-card">
    <div class="result-compare">
      <div class="result-col">
        <canvas id="yoursCanvas" class="result-canvas"></canvas>
        <span class="result-caption">TUYO</span>
      </div>
      <div class="result-col">
        <canvas id="logoCanvas" class="result-canvas"></canvas>
        <span class="result-caption" id="logoNameResult">NIKE</span>
      </div>
    </div>

    <div class="verdict-block">
      <div class="verdict" id="verdictText">SOOO GOOD...</div>
      <div class="percent" id="percentText">98% match</div>
    </div>

    <div class="result-actions">
      <button id="btnOtro" class="btn btn-primary">OTRO LOGO</button>
      <button id="btnCompartir" class="btn btn-ghost">COMPARTIR</button>
    </div>
  </div>
</section>

<canvas id="hiddenLogoCanvas" style="display:none"></canvas>

<script src="logos.js"></script>
<script src="scoring.js"></script>
<script src="app.js"></script>
</body>
</html>
