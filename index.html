<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>TRAZO</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0a0a0a;color:#fff;font-family:Inter,sans-serif;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:20px;overflow:hidden}
.top{width:100%;max-width:440px;display:flex;justify-content:space-between;align-items:baseline}
.brand{font-family:'Bebas Neue';font-size:30px;letter-spacing:2px}
.cat{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#666}
.stage{position:relative;width:100%;max-width:440px;aspect-ratio:1;background:#fff;border-radius:20px;overflow:hidden;touch-action:none}
.stage.bad{animation:shake .3s}
.stage.bad::after{content:'';position:absolute;inset:0;background:#ff3b30;opacity:.18;pointer-events:none}
@keyframes shake{25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
#full{opacity:0;transition:opacity .45s ease}
#full.show{opacity:1}
.win{position:absolute;left:0;right:0;bottom:0;padding:22px;background:linear-gradient(transparent,rgba(0,0,0,.75));color:#fff;font-family:'Bebas Neue';font-size:42px;letter-spacing:2px;text-align:center;opacity:0;transition:opacity .45s;pointer-events:none}
.win.show{opacity:1}
.bar{width:100%;max-width:440px;display:flex;gap:10px}
button{flex:1;background:#fff;color:#000;border:0;border-radius:12px;padding:15px;font-family:'Bebas Neue';font-size:20px;letter-spacing:2px;cursor:pointer}
button.ghost{background:transparent;color:#666;border:1px solid #262626}
.hint{font-size:12px;color:#555;height:16px}
</style>
</head>
<body>

<div class="top"><div class="brand">TRAZO</div><div class="cat" id="cat">Coches</div></div>

<div class="stage" id="stage">
  <canvas id="base"></canvas>
  <canvas id="ink"></canvas>
  <canvas id="full"></canvas>
  <div class="win" id="win"></div>
</div>

<div class="hint" id="hint">Dibuja la parte que falta</div>

<div class="bar">
  <button class="ghost" id="clear">Borrar</button>
  <button id="next">Siguiente</button>
</div>

<script>
/* ── AJUSTES DE DIFICULTAD ───────────────────────── */
const BRUSH        = 26;    // grosor del pincel
const TOL          = 11;    // margen permitido alrededor de la pieza
const WIN_COVER    = 0.80;  // % de la pieza que hay que cubrir
const MAX_OUTSIDE  = 0.35;  // % de trazo fuera antes de borrarlo
/* ────────────────────────────────────────────────── */

const SUPA_URL = 'https://gdisbjqfaqtljdycxsuv.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkaXNianFmYXF0bGpkeWN4c3V2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4OTY4ODgsImV4cCI6MjA5OTQ3Mjg4OH0.KjO2evw-9ePDsrCJ_OGhve7zZRFRN2PmpV6EYNBiFCQ';

const V = 200; // viewBox de los SVG

const LOGOS = [
{ name:'BMW',
  base:`<circle cx="100" cy="100" r="96" fill="#000"/>
        <circle cx="100" cy="100" r="74" fill="#fff"/>
        <path d="M100 100 L100 174 A74 74 0 0 1 26 100 Z" fill="#0166B1"/>`,
  piece:`<path d="M100 100 L100 26 A74 74 0 0 1 174 100 Z" fill="#0166B1"/>` },

{ name:'Audi',
  base:`<g fill="none" stroke="#111" stroke-width="10">
          <circle cx="42" cy="100" r="36"/>
          <circle cx="80" cy="100" r="36"/>
          <circle cx="118" cy="100" r="36"/>
        </g>`,
  piece:`<circle cx="156" cy="100" r="36" fill="none" stroke="#111" stroke-width="10"/>` },

{ name:'Mercedes-Benz',
  base:`<circle cx="100" cy="100" r="88" fill="none" stroke="#111" stroke-width="9"/>
        <path d="M100 100 L28 141 M100 100 L172 141" stroke="#111" stroke-width="11" stroke-linecap="round"/>`,
  piece:`<path d="M100 100 L100 17" stroke="#111" stroke-width="11" stroke-linecap="round"/>` },

{ name:'Toyota',
  base:`<g fill="none" stroke="#EB0A1E" stroke-width="12">
          <ellipse cx="100" cy="100" rx="92" ry="56"/>
          <ellipse cx="100" cy="118" rx="58" ry="26"/>
        </g>`,
  piece:`<ellipse cx="100" cy="70" rx="26" ry="40" fill="none" stroke="#EB0A1E" stroke-width="12"/>` }
];

const M = 300; // resolución de las máscaras
const stage = document.getElementById('stage');
const cBase = document.getElementById('base');
const cInk  = document.getElementById('ink');
const cFull = document.getElementById('full');
const winEl = document.getElementById('win');
const hintEl= document.getElementById('hint');

let S = 600;                 // tamaño real del canvas
let idx = 0;
let target, allowed, drawn;  // Uint8Array de M*M
let targetCount = 0;
let strokes = [], cur = null, drawing = false, solved = false;

function svgURL(inner){
  const s = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${V} ${V}">${inner}</svg>`;
  return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(s);
}
function load(inner){
  return new Promise(r=>{ const i = new Image(); i.onload=()=>r(i); i.src = svgURL(inner); });
}

/* dilatación (max-filter separable) */
function dilate(src, rad){
  const tmp = new Uint8Array(M*M), out = new Uint8Array(M*M);
  for(let y=0;y<M;y++) for(let x=0;x<M;x++){
    let v=0;
    for(let k=-rad;k<=rad;k++){ const xx=x+k; if(xx>=0&&xx<M&&src[y*M+xx]){v=1;break;} }
    tmp[y*M+x]=v;
  }
  for(let x=0;x<M;x++) for(let y=0;y<M;y++){
    let v=0;
    for(let k=-rad;k<=rad;k++){ const yy=y+k; if(yy>=0&&yy<M&&tmp[yy*M+x]){v=1;break;} }
    out[y*M+x]=v;
  }
  return out;
}

function maskFromImage(img){
  const c = document.createElement('canvas'); c.width=c.height=M;
  const x = c.getContext('2d'); x.drawImage(img,0,0,M,M);
  const d = x.getImageData(0,0,M,M).data;
  const m = new Uint8Array(M*M);
  for(let i=0;i<M*M;i++) m[i] = d[i*4+3] > 100 ? 1 : 0;
  return m;
}

function maskFromStroke(pts){
  const c = document.createElement('canvas'); c.width=c.height=M;
  const x = c.getContext('2d');
  const k = M/S;
  x.lineWidth = BRUSH*k; x.lineCap='round'; x.lineJoin='round'; x.strokeStyle='#000';
  x.beginPath(); x.moveTo(pts[0].x*k, pts[0].y*k);
  for(const p of pts) x.lineTo(p.x*k, p.y*k);
  if(pts.length===1) x.lineTo(pts[0].x*k+.1, pts[0].y*k);
  x.stroke();
  const d = x.getImageData(0,0,M,M).data;
  const m = new Uint8Array(M*M);
  for(let i=0;i<M*M;i++) m[i] = d[i*4+3] > 60 ? 1 : 0;
  return m;
}

function ching(){
  const a = new (window.AudioContext||window.webkitAudioContext)();
  [880,1320].forEach((f,i)=>{
    const o=a.createOscillator(), g=a.createGain();
    o.type='sine'; o.frequency.value=f;
    g.gain.setValueAtTime(0,a.currentTime+i*.08);
    g.gain.linearRampToValueAtTime(.25,a.currentTime+i*.08+.01);
    g.gain.exponentialRampToValueAtTime(.001,a.currentTime+i*.08+.5);
    o.connect(g); g.connect(a.destination);
    o.start(a.currentTime+i*.08); o.stop(a.currentTime+i*.08+.55);
  });
}

function paintInk(){
  const x = cInk.getContext('2d');
  x.clearRect(0,0,S,S);
  x.lineWidth=BRUSH; x.lineCap='round'; x.lineJoin='round'; x.strokeStyle='#1a1a1a';
  const all = cur ? strokes.concat([cur]) : strokes;
  for(const st of all){
    x.beginPath(); x.moveTo(st[0].x, st[0].y);
    for(const p of st) x.lineTo(p.x, p.y);
    x.stroke();
  }
}

async function loadLogo(){
  const L = LOGOS[idx];
  solved=false; strokes=[]; cur=null;
  drawn = new Uint8Array(M*M);
  winEl.classList.remove('show'); cFull.classList.remove('show');
  hintEl.textContent = 'Dibuja la parte que falta';

  const [bImg,pImg,fImg] = await Promise.all([
    load(L.base), load(L.piece), load(L.base + L.piece)
  ]);

  [cBase,cInk,cFull].forEach(c=>{ c.width=S; c.height=S; c.getContext('2d').clearRect(0,0,S,S); });
  cBase.getContext('2d').drawImage(bImg,0,0,S,S);
  cFull.getContext('2d').drawImage(fImg,0,0,S,S);

  target  = maskFromImage(pImg);
  allowed = dilate(target, TOL);
  targetCount = target.reduce((a,b)=>a+b,0);
}

function endStroke(){
  if(!cur || cur.length<2){ cur=null; paintInk(); return; }
  const sm = maskFromStroke(cur);
  let total=0, outside=0;
  for(let i=0;i<M*M;i++) if(sm[i]){ total++; if(!allowed[i]) outside++; }

  if(total===0 || outside/total > MAX_OUTSIDE){
    cur=null; paintInk();
    stage.classList.add('bad');
    setTimeout(()=>stage.classList.remove('bad'),300);
    return;
  }

  strokes.push(cur); cur=null; paintInk();
  for(let i=0;i<M*M;i++) if(sm[i]) drawn[i]=1;

  const fat = dilate(drawn, 5);
  let hit=0;
  for(let i=0;i<M*M;i++) if(target[i] && fat[i]) hit++;

  if(hit/targetCount >= WIN_COVER) win();
}

function win(){
  solved = true;
  ching();
  cFull.classList.add('show');
  winEl.textContent = LOGOS[idx].name;
  winEl.classList.add('show');
  hintEl.textContent = '';
  setTimeout(()=>{ cInk.getContext('2d').clearRect(0,0,S,S); }, 500);
}

function pos(e){
  const r = stage.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return { x:(t.clientX-r.left)*(S/r.width), y:(t.clientY-r.top)*(S/r.height) };
}
function down(e){ if(solved) return; e.preventDefault(); drawing=true; cur=[pos(e)]; paintInk(); }
function move(e){ if(!drawing||solved) return; e.preventDefault(); cur.push(pos(e)); paintInk(); }
function up(e){ if(!drawing||solved) return; e.preventDefault(); drawing=false; endStroke(); }

stage.addEventListener('pointerdown',down);
stage.addEventListener('pointermove',move);
stage.addEventListener('pointerup',up);
stage.addEventListener('pointerleave',up);

document.getElementById('clear').onclick = ()=>{ if(solved) return; strokes=[]; cur=null; drawn=new Uint8Array(M*M); paintInk(); };
document.getElementById('next').onclick  = ()=>{ idx=(idx+1)%LOGOS.length; loadLogo(); };

loadLogo();
</script>
</body>
</html>
